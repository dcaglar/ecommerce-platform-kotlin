# Source: payment-edge-cell/templates/edge-db-init-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: edge-db-init-secret
  namespace: payment
type: Opaque
stringData:
  init-edge-db.sh: |
    #!/bin/bash
    set -e

    echo "🔌 Enabling required extensions..."
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" -c "CREATE EXTENSION IF NOT EXISTS pg_stat_statements;"
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" -c "CREATE EXTENSION IF NOT EXISTS btree_gin;"
    
    echo "🏗️ Phase 1: Creating Pre-Defined Group Roles..."
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
        -- SuperNPA Group (Full Admin for Apps/Jobs)
        DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'SuperNPA') THEN
            CREATE ROLE "SuperNPA" NOLOGIN SUPERUSER;
        END IF; END \$\$;

        -- Duty Group (Full Admin for Humans)
        DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'Duty') THEN
            CREATE ROLE "Duty" NOLOGIN SUPERUSER;
        END IF; END \$\$;

        -- Owner Group (Read/Write Data, No DDL)
        DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'Owner') THEN
            CREATE ROLE "Owner" NOLOGIN;
        END IF; END \$\$;
        
        -- Base Schema Privileges for Owner
        GRANT USAGE ON SCHEMA public TO "Owner";
        
        -- Configure default privileges for future tables created by the root 'postgres' user (which Liquibase uses)
        -- This guarantees that 'Owner' group automatically gets DML access to newly migrated tables.
        ALTER DEFAULT PRIVILEGES FOR ROLE postgres IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO "Owner";
        ALTER DEFAULT PRIVILEGES FOR ROLE postgres IN SCHEMA public GRANT USAGE, SELECT, UPDATE ON SEQUENCES TO "Owner";
    EOSQL

    echo "👤 Phase 2: Creating Users and Assigning to Group Roles..."
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
        
        -- 1. Payment Service -> Owner Role
        DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = '$EDGE_DB_PAYMENT_SERVICE_USERNAME') THEN
            CREATE USER "$EDGE_DB_PAYMENT_SERVICE_USERNAME" WITH PASSWORD '$EDGE_DB_PAYMENT_SERVICE_PASSWORD';
        END IF; END \$\$;
        GRANT "Owner" TO "$EDGE_DB_PAYMENT_SERVICE_USERNAME";

        -- 2. Edge Workers -> Owner Role
        DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = '$EDGE_DB_PAYMENT_EDGE_WORKERS_USERNAME') THEN
            CREATE USER "$EDGE_DB_PAYMENT_EDGE_WORKERS_USERNAME" WITH PASSWORD '$EDGE_DB_PAYMENT_EDGE_WORKERS_PASSWORD';
        END IF; END \$\$;
        GRANT "Owner" TO "$EDGE_DB_PAYMENT_EDGE_WORKERS_USERNAME";

        -- 3. Human Duty Operator -> Duty Role
        DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = '$EDGE_DB_DUTY_USERNAME') THEN
            CREATE USER "$EDGE_DB_DUTY_USERNAME" WITH PASSWORD '$EDGE_DB_DUTY_PASSWORD';
        END IF; END \$\$;
        GRANT "Duty" TO "$EDGE_DB_DUTY_USERNAME";
        
    EOSQL

    echo "✅ Edge DB RBAC strictly initialized."
---
