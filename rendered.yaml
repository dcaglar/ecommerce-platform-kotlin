apiVersion: v1
kind: ConfigMap
metadata:
  name: edge-db-changelog-configmap
data:
  20260208-optimize-idempotency-vacuum.xml: |-
    <?xml version="1.0" encoding="UTF-8"?>
    <databaseChangeLog
            xmlns="http://www.liquibase.org/xml/ns/dbchangelog"
            xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
            xsi:schemaLocation="
            http://www.liquibase.org/xml/ns/dbchangelog
            http://www.liquibase.org/xml/ns/dbchangelog/dbchangelog-4.3.xsd">
        <changeSet id="20260208-optimize-idempotency-vacuum" author="dogancaglar" runInTransaction="false">
    
            <sql>
                ALTER TABLE idempotency_keys SET (
                fillfactor = 70,
                autovacuum_vacuum_scale_factor = 0.01,
                autovacuum_vacuum_cost_limit = 1000
                );
                VACUUM FULL idempotency_keys;
            </sql>
    
        </changeSet>
    
    
    </databaseChangeLog>
    
  changelog.edge.xml: |-
    <?xml version="1.0" encoding="UTF-8"?>
    <databaseChangeLog
            xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
            xmlns="http://www.liquibase.org/xml/ns/dbchangelog"
            xsi:schemaLocation="http://www.liquibase.org/xml/ns/dbchangelog
                            http://www.liquibase.org/xml/ns/dbchangelog/dbchangelog-4.3.xsd">
        <include file="payment-intent-changelog.xml" relativeToChangelogFile="true"/>
        <include file="local-outbox-changelog.xml" relativeToChangelogFile="true"/>
        <include file="idempotency-key-changelog.xml" relativeToChangelogFile="true"/>
        <include file="20260208-optimize-idempotency-vacuum.xml" relativeToChangelogFile="true"/>
        <!-- Epic 1: Payment aggregate moved to Central DB — remove from edge -->
    </databaseChangeLog>
    
  idempotency-key-changelog.xml: |-
    <?xml version="1.0" encoding="UTF-8"?>
    <databaseChangeLog
    xmlns="http://www.liquibase.org/xml/ns/dbchangelog"
    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
    xsi:schemaLocation="
            http://www.liquibase.org/xml/ns/dbchangelog
            http://www.liquibase.org/xml/ns/dbchangelog/dbchangelog-4.3.xsd">
    <changeSet id="idempotency-key-changelog" author="dogancaglar">
    
        <!-- 1️⃣ Table definition -->
        <createTable tableName="idempotency_keys">
    
            <!-- Internal optimized sequence ID as Primary Key -->
            <column name="id" type="bigint" autoIncrement="true">
                <constraints primaryKey="true" primaryKeyName="pk_idempotency_keys_id" nullable="false"/>
            </column>
    
            <!-- External merchant idempotency key -->
            <column name="idempotency_key" type="uuid">
                <constraints nullable="false"/>
            </column>
    
            <column name="payment_intent_id" type="BIGINT">
                <constraints nullable="true"/>
            </column>
            <column name="request_hash" type="VARCHAR(128)">
                <constraints  nullable="true"/>
            </column>
    
            <column name="response_payload" type="jsonb">
                <constraints nullable="true"/>
            </column>
    
            <column name="status" type="VARCHAR(20)">
                <constraints nullable="true"/>
            </column>
    
            <column name="created_at" type="TIMESTAMP WITHOUT TIME ZONE"
                    defaultValueComputed="(now() AT TIME ZONE 'UTC')">
                <constraints nullable="false"/>
            </column>
        </createTable>
    
        <!-- 2️⃣ Ensure merchant idempotency key is strictly unique -->
        <addUniqueConstraint tableName="idempotency_keys" columnNames="idempotency_key" constraintName="uk_idempotency_key"/>
    
        <!-- 3️⃣ Constraints (SQL for cross-version Liquibase compatibility) -->
        <sql>
            ALTER TABLE idempotency_keys
            ADD CONSTRAINT chk_idem_req_status
            CHECK (status IN (
            'PENDING', 'COMPLETED'
            ));
        </sql>
    
        <!-- 4️⃣ Useful indexes -->
        <createIndex indexName="idx_idempotency_request_hash"
                     tableName="idempotency_keys">
            <column name="request_hash"/>
        </createIndex>
    
        <createIndex indexName="idx_idempotency_payment_intent_id"
                     tableName="idempotency_keys">
            <column name="payment_intent_id"/>
        </createIndex>
    
        <!-- 5️⃣ Rollback -->
        <rollback>
            <dropTable tableName="idempotency_keys"/>
        </rollback>
    
    </changeSet>
    
    </databaseChangeLog>
    
  local-outbox-changelog.xml: |-
    <?xml version="1.0" encoding="UTF-8"?>
    <databaseChangeLog
            xmlns="http://www.liquibase.org/xml/ns/dbchangelog"
            xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
            xsi:schemaLocation="http://www.liquibase.org/xml/ns/dbchangelog
            http://www.liquibase.org/xml/ns/dbchangelog/dbchangelog-4.3.xsd">
            <!-- =============================================================
                 01. Create main partitioned outbox_event table
                 ============================================================= -->
            <changeSet id="20251112-01-create-outbox-event-parent" author="dogancaglar">
                <sql>
                    CREATE TABLE outbox_event (
                    oeid           BIGINT NOT NULL,
                    event_type     VARCHAR(255) NOT NULL,
                    aggregate_id   VARCHAR(255) NOT NULL,
                    payload        TEXT NOT NULL,
                    status         VARCHAR(50) NOT NULL,
                    created_at     TIMESTAMP WITHOUT TIME ZONE NOT NULL DEFAULT (NOW() AT TIME ZONE 'UTC'),
                    updated_at     TIMESTAMP WITHOUT TIME ZONE NOT NULL DEFAULT (NOW() AT TIME ZONE 'UTC'),
                    claimed_at     TIMESTAMP WITHOUT TIME ZONE,
                    claimed_by     VARCHAR(128),
                    PRIMARY KEY (oeid, created_at)
                    )
                    PARTITION BY RANGE (created_at);
                </sql>
            </changeSet>
    
            <!-- =============================================================
                 02. Helpful indexes for filtering, ordering, claiming
                 ============================================================= -->
            <changeSet id="20251112-02-create-index-outbox-event-createdat" author="dogancaglar">
                <createIndex indexName="idx_outbox_event_createdat" tableName="outbox_event">
                    <column name="created_at"/>
                </createIndex>
            </changeSet>
    
            <changeSet id="20251112-03-create-index-outbox-event-status" author="dogancaglar">
                <createIndex indexName="idx_outbox_event_status" tableName="outbox_event">
                    <column name="status"/>
                </createIndex>
            </changeSet>
    
            <changeSet id="20251112-04-create-index-outbox-status-createdat" author="dogancaglar">
                <createIndex indexName="idx_outbox_status_createdat" tableName="outbox_event">
                    <column name="status"/>
                    <column name="created_at"/>
                </createIndex>
            </changeSet>
    
            <changeSet id="20251112-05-create-index-outbox-status-claimedat" author="dogancaglar">
                <createIndex indexName="idx_outbox_status_claimed_at" tableName="outbox_event">
                    <column name="status"/>
                    <column name="claimed_at"/>
                </createIndex>
            </changeSet>
    
        </databaseChangeLog>
    
  payment-intent-changelog.xml: |-
    <?xml version="1.0" encoding="UTF-8"?>
    <databaseChangeLog
            xmlns="http://www.liquibase.org/xml/ns/dbchangelog"
            xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
            xsi:schemaLocation="
            http://www.liquibase.org/xml/ns/dbchangelog
            http://www.liquibase.org/xml/ns/dbchangelog/dbchangelog-4.20.xsd">
    
        <changeSet id="2025-12-06-create-payment-intents" author="dogancaglar">
    
            <!-- 1️⃣ Create table -->
            <createTable tableName="payment_intents">
    
                <column name="payment_intent_id" type="BIGINT">
                    <constraints primaryKey="true" nullable="false"/>
                </column>
                <column name="buyer_id" type="VARCHAR(255)">
                    <constraints nullable="false"/>
                </column>
    
                <column name="order_id" type="VARCHAR(255)">
                    <constraints nullable="false"/>
                </column>
    
                <column name="merchant_account" type="VARCHAR(255)">
                    <constraints nullable="false"/>
                </column>
    
                <column name="processing_model" type="VARCHAR(255)">
                    <constraints nullable="false"/>
                </column>
    
                <column name="psp_reference" type="VARCHAR(255)"/>
    
                <column name="total_amount_value" type="BIGINT">
                    <constraints nullable="false"/>
                </column>
    
    
                <column name="currency" type="CHAR(3)">
                    <constraints nullable="false"/>
                </column>
    
    
                <column name="status" type="VARCHAR(50)">
                    <constraints nullable="false"/>
                </column>
                <column name="splits_json" type="jsonb"/>
                <column name="created_at" type="TIMESTAMP WITHOUT TIME ZONE"
                        defaultValueComputed="(now() AT TIME ZONE 'UTC')">
                    <constraints nullable="false"/>
                </column>
    
                <column name="updated_at" type="TIMESTAMP WITHOUT TIME ZONE"
                        defaultValueComputed="(now() AT TIME ZONE 'UTC')">
                    <constraints nullable="false"/>
                </column>
            </createTable>
    
            <createIndex tableName="payment_intents" indexName="idx_payment_intents_psp_reference">
                <column name="psp_reference"/>
            </createIndex>
    
            <!-- 2️⃣ Constraints via SQL (Liquibase-safe for all 4.x versions) -->
            <sql>
                ALTER TABLE payment_intents
                ADD CONSTRAINT chk_payment_intent_status_valid
                CHECK (status IN (
                'CREATED_PENDING',
                'CREATED',
                'PENDING_AUTH',
                'AUTHORIZED',
                'DECLINED',
                'FAILED',
                'CANCELLED'
                ));
            </sql>
    
            <sql>
                ALTER TABLE payment_intents
                ADD CONSTRAINT chk_payment_intent_currency_3
                CHECK (currency ~ '^[A-Z]{3}$');
            </sql>
    
            <sql>
                ALTER TABLE payment_intents
                ADD CONSTRAINT chk_payment_intent_total_amount_value_le_total
                CHECK (
                total_amount_value &gt;= 0 AND
                total_amount_value &lt;= total_amount_value
                );
            </sql>
    
    
            <!-- 4️⃣ Rollback -->
            <rollback>
                <dropTable tableName="payment_intents"/>
            </rollback>
    
        </changeSet>
    
    </databaseChangeLog>
