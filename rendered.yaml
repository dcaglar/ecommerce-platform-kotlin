# Source: payment-edge-cell/templates/edge-db-init-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: edge-db-init-configmap
  namespace: payment
data:
  init-edge-db.sh: |
    #!/bin/bash
    set -e

    echo "🔌 Enabling pg_stat_statements extension..."
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" -c "CREATE EXTENSION IF NOT EXISTS pg_stat_statements;"
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" -c "CREATE EXTENSION IF NOT EXISTS btree_gin;"
    /// INSTEAD OF ADDING INIT-EDE-DB OCONFIGMAP, LETS ADD IT DO EDGE-DB.SECRET , SO IT WOULD BE SERCRET AND SEMORE SECURE
    echo "Creating payment_service user..."
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
        DO \$\$
        BEGIN
            IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = '$EDGE_DB_PAYMENT_SERVICE_USERNAME') THEN
                CREATE USER "$EDGE_DB_PAYMENT_SERVICE_USERNAME" WITH PASSWORD '$EDGE_DB_PAYMENT_SERVICE_PASSWORD';
            END IF;
        END
        \$\$;
        GRANT ALL ON SCHEMA public TO "$EDGE_DB_PAYMENT_SERVICE_USERNAME";
        GRANT CREATE ON SCHEMA public TO "$EDGE_DB_PAYMENT_SERVICE_USERNAME";
        GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO "$EDGE_DB_PAYMENT_SERVICE_USERNAME";
        GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO "$EDGE_DB_PAYMENT_SERVICE_USERNAME";
    EOSQL

    echo "Creating edge_workers user..."
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
        DO \$\$
    //1-do creaate a new role with this namee , for this users wtih those password i define here.
        BEGIN
            IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = '$EDGE_DB_PAYMENT_EDGE_WORKERS_USERNAME') THEN
                CREATE USER "$EDGE_DB_PAYMENT_EDGE_WORKERS_USERNAME" WITH PASSWORD '$EDGE_DB_PAYMENT_EDGE_WORKERS_PASSWORD';
            END IF;
        END
        \$\$;
        GRANT ALL ON SCHEMA public TO "$EDGE_DB_PAYMENT_EDGE_WORKERS_USERNAME";
        GRANT CREATE ON SCHEMA public TO "$EDGE_DB_PAYMENT_EDGE_WORKERS_USERNAME";
        GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO "$EDGE_DB_PAYMENT_EDGE_WORKERS_USERNAME";
        GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO "$EDGE_DB_PAYMENT_EDGE_WORKERS_USERNAME";
    EOSQL
    echo "Creating duty user..."
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
        DO \$\$
        BEGIN
            IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = '$EDGE_DB_DUTY_USERNAME') THEN
                CREATE USER "$EDGE_DB_DUTY_USERNAME" WITH PASSWORD '$EDGE_DB_DUTY_PASSWORD';
            END IF;
        END
        \$\$;
        GRANT ALL ON SCHEMA public TO "$EDGE_DB_DUTY_USERNAME";
        GRANT CREATE ON SCHEMA public TO "$EDGE_DB_DUTY_USERNAME";
        GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO "$EDGE_DB_DUTY_USERNAME";
        GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO "$EDGE_DB_DUTY_USERNAME";
        GRANT "$EDGE_DB_PAYMENT_SERVICE_USERNAME" TO "$EDGE_DB_DUTY_USERNAME";
    EOSQL
    echo "Configuring default privileges for future tables..."
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
        -- When payment_service creates tables/sequences (via Liquibase), automatically grant access to edge_workers and duty
        ALTER DEFAULT PRIVILEGES FOR ROLE "$EDGE_DB_PAYMENT_SERVICE_USERNAME" IN SCHEMA public GRANT ALL PRIVILEGES ON TABLES TO "$EDGE_DB_PAYMENT_EDGE_WORKERS_USERNAME";
        ALTER DEFAULT PRIVILEGES FOR ROLE "$EDGE_DB_PAYMENT_SERVICE_USERNAME" IN SCHEMA public GRANT ALL PRIVILEGES ON SEQUENCES TO "$EDGE_DB_PAYMENT_EDGE_WORKERS_USERNAME";
        
        ALTER DEFAULT PRIVILEGES FOR ROLE "$EDGE_DB_PAYMENT_SERVICE_USERNAME" IN SCHEMA public GRANT ALL PRIVILEGES ON TABLES TO "$EDGE_DB_DUTY_USERNAME";
        ALTER DEFAULT PRIVILEGES FOR ROLE "$EDGE_DB_PAYMENT_SERVICE_USERNAME" IN SCHEMA public GRANT ALL PRIVILEGES ON SEQUENCES TO "$EDGE_DB_DUTY_USERNAME";
    EOSQL

    echo "✅ Edge DB initialized with all required users and extensions."
---
