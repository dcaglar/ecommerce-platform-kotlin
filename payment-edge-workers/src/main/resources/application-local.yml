app:
  instance-id: ${POD_NAME:${HOSTNAME:${random.value}}}
  datasource:
    outbox:
      jdbc-url: ${EDGE_DB_URL}
      username: ${EDGE_DB_PAYMENT_EDGE_WORKERS_USERNAME}
      password: ${EDGE_DB_PAYMENT_EDGE_WORKERS_PASSWORD}
      connection-timeout: 15000
      validation-timeout: 15000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 20
    maintenance:
      jdbc-url: ${EDGE_DB_URL}
      username: ${EDGE_DB_DUTY_USERNAME}
      password: ${EDGE_DB_DUTY_PASSWORD}
      maximum-pool-size: 1
      minimum-idle: 0
      connection-timeout: 15000
      validation-timeout: 15000
      idle-timeout: 60000
      max-lifetime: 1800000
    central:
      jdbc-url: ${CENTRAL_DB_URL}
      username: ${CENTRAL_DB_PAYMENT_EDGE_WORKERS_USERNAME}
      password: ${CENTRAL_DB_PAYMENT_EDGE_WORKERS_PASSWORD}
      connection-timeout: 15000
      validation-timeout: 15000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 10

spring:
  data:
    redis:
      url: ${SPRING_DATA_REDIS_URL:redis://localhost:6379}
      timeout: 10s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
          max-wait: 5000ms

outbox-dispatcher:
  thread-count: 4
  batch-size: 500
  pool-size: 4

db:
  outbox:
    statement-timeout-ms: 2000
    lock-timeout-ms: 200
    idle-in-tx-timeout-ms: 0