prometheusOperator:
  resources:
    requests: { cpu: 30m,  memory: 96Mi }
    limits:   { memory: 96Mi }
  admissionWebhooks:
    enabled: false
    patch:
      enabled: false
  tls:
    enabled: false

prometheus:
  prometheusSpec:
    enableAdminAPI: true
    enableRemoteWriteReceiver: true
    containers:
      - name: config-reloader
        resources:
          requests: { cpu: 5m,  memory: 24Mi }
          limits:   { memory: 24Mi }
    resources:
      requests: { cpu: 150m, memory: 600Mi }
      limits:   { memory: 600Mi }
    retention: 2h
    walCompression: true
    scrapeInterval: 60s
    evaluationInterval: 60s
    serviceMonitorSelector:
      matchLabels:
        release: prometheus-stack
    serviceMonitorNamespaceSelector: {}   # 👈 allow ServiceMonitors from ALL namespaces

alertmanager:
  alertmanagerSpec:
    containers:
      - name: config-reloader
        resources:
          requests: { cpu: 5m,  memory: 24Mi }
          limits:   { memory: 24Mi }
    resources:
      requests: { cpu: 30m, memory: 48Mi }
      limits:   { memory: 48Mi }

grafana:
  adminPassword: admin
  plugins: []
  readinessProbe:
    timeoutSeconds: 10
    periodSeconds: 30
    failureThreshold: 20
  livenessProbe:
    timeoutSeconds: 10
    periodSeconds: 30
    failureThreshold: 20
  grafana.ini:
    database:
      query_retries: 5
      transaction_retries: 5
      wal: true
  service:
    type: NodePort
    nodePort: 32000
  resources:
    requests: { cpu: 200m, memory: 512Mi }
    limits:   { memory: 1024Mi }
  sidecar:
    datasources:
      resources:
        requests: { cpu: 5m,  memory: 24Mi }
        limits:   { memory: 24Mi }
    dashboards:
      resources:
        requests: { cpu: 5m,  memory: 24Mi }
        limits:   { memory: 24Mi }

kube-state-metrics:
  resources:
    requests: { cpu: 30m,  memory: 48Mi }
    limits:   { memory: 48Mi }

prometheus-node-exporter:
  resources:
    requests: { cpu: 15m,  memory: 24Mi }
    limits:   { memory: 24Mi }

prometheusAdapter:
  enabled: false