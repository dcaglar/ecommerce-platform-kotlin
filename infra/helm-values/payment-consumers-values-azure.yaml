spring:
  profile: azure
image:
  repository: dcaglar1987/payment-consumers
  tag: latest
  pullPolicy: Always
resources:
  requests: {cpu: "1000m", memory: "1024Mi"}
  limits: {cpu: "3000m", memory: "2048Mi"}
jvmOpts: >-
  -XX:+UseG1GC -XX:+AlwaysActAsServerClassMachine -XX:+UseStringDeduplication -XX:MaxRAMPercentage=45 -XX:InitialRAMPercentage=45 -XX:MaxMetaspaceSize=128m -XX:MaxDirectMemorySize=128m -XX:ThreadStackSize=512 -XX:MaxGCPauseMillis=200 -XX:InitiatingHeapOccupancyPercent=30
service:
  type: ClusterIP
  portName: http
  port: 8080
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 6
  metrics:
    - type: External
      external:
        metric:
          name: kafka_consumer_group_lag_worst2
        target:
          type: Value
          value: "2400" # keep as string quantity
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 120
      selectPolicy: Max
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
serviceMonitor:
  enabled: false
  path: /actuator/prometheus
  interval: 15s
  scrapeTimeout: 10s
  scheme: http
  labels:
    release: prometheus-stack
replicaCount: 1
nodeSelector:
  pool: central

redis:
  url: redis://redis-master:6379
kafka:
  bootstrapServers: kafka.payment.svc.cluster.local:9092
