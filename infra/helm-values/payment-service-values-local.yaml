spring:
  profile: "local"


runPrivilegeGrantJob: true


autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # Increased to 85% to avoid 'panic' scaling on noise
          averageUtilization: 85
  behavior:
      scaleUp:
        stabilizationWindowSeconds: 15
        selectPolicy: Max
        policies:
          - type: Pods
            value: 1           # Add 1 pod at a time
            periodSeconds: 45  # Wait 45s between steps to allow JIT/warmup
      scaleDown:
        # "The Patience Window": Keep pods for 5 mins after load drops.
        # Prevents killing pods during small traffic dips.
        stabilizationWindowSeconds: 300
        selectPolicy: Max
        policies:
          - type: Percent
            value: 100
            periodSeconds: 15


jvmOpts: >-
  -XX:+UseG1GC
  -XX:+AlwaysActAsServerClassMachine
  -XX:+UseStringDeduplication
  -XX:MaxRAMPercentage=45
  -XX:InitialRAMPercentage=45
  -XX:MaxMetaspaceSize=128m
  -XX:MaxDirectMemorySize=128m
  -XX:ThreadStackSize=512
  -XX:MaxGCPauseMillis=200
  -XX:InitiatingHeapOccupancyPercent=30

replicaCount: 1
resources:
  requests: { cpu: "500m", memory: "512Mi" }
  limits:   { cpu: "1",    memory: "1Gi"   }







ingress:
  enabled: true
  className: nginx
  host: ${INGRESS_HOST}
  path: /
  pathType: Prefix
  annotations:
    # 1. Load Balancing Algorithm
    nginx.ingress.kubernetes.io/load-balance: "ewma"


    # 2. Increase Timeouts
    # 10s is too short when the DB is under heavy pressure.
    # Give the backend 30s to respond before Nginx kills the request.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "5"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "10"

    # 3. Connection Management
    # Increase keepalive to prevent the overhead of recreating TCP connections constantly.
    nginx.ingress.kubernetes.io/upstream-keepalive-timeout: "120"
    nginx.ingress.kubernetes.io/upstream-keepalive-connections: "200"

    # 4. Concurrency Protection (The Bouncer)
    # Limit simultaneous connections to slightly above your total capacity (Threads + Queue).
    # 250 threads + 100 accept-count = 350. Set limit to 400.
    nginx.ingress.kubernetes.io/limit-connections: "350"
  tls: []   # HTTP for minikube

serviceMonitor:
  enabled: true
  path: /actuator/prometheus
  interval: 15s
  scrapeTimeout: 10s
  scheme: http
  labels:
    release: prometheus-stack


service:
  type: ClusterIP
  port: 8080
  portName: http

