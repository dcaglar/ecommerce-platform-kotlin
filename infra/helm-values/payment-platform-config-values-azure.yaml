# Non-secret config — Azure profile
# YUGABYTE_DB_URL: corrected DNS to yb-tservers (plural) — the Kubernetes service
# name created by the YugabyteDB Helm chart (release: yugabyte) is yb-tservers.
# Local used the short in-cluster name; Azure uses the fully-qualified DNS for clarity.
KEYCLOAK_ISSUER_URL: "http://keycloak:8080/realms/ecommerce-platform"
EDGE_DB_URL: "jdbc:postgresql://localhost:5432/edge-db?options=-c%20timezone=UTC"
CENTRAL_DB_URL: "jdbc:postgresql://central-db-postgresql:5432/central-db?options=-c%20timezone=UTC"
EDGE_DB_NAME: "edge-db"
CENTRAL_DB_NAME: "central-db"
YUGABYTE_DB_URL: "jdbc:postgresql://yb-tservers.payment.svc.cluster.local:5433/yugabyte?options=-c%20timezone=UTC"