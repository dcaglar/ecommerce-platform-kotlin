
# ingress-values.yaml
controller:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: ingress-nginx # or wherever your operator is
      additionalLabels:
        release: prometheus-stack # Match the label your operator looks for
  service:
    type: LoadBalancer
    ports:
      http: 80
      https: 443
  resources:
    requests:
      cpu: 100m
      memory: 90Mi
    limits:
      cpu: 300m
      memory: 912Mi
  admissionWebhooks:
    patch:
      resources:
        requests:
          cpu: 20m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
    createSecretJob:
      resources:
        requests:
          cpu: 20m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
