
# ingress-controller-values-local.yaml
controller:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: ingress-nginx # or wherever your operator is
      additionalLabels:
        release: prometheus-stack # Match the label your operator looks for
  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: "/healthz"
    ports:
      http: 80
      https: 443
  resources:
    requests:
      cpu: 100m
      memory: 400Mi
    limits:
      memory: 400Mi
  admissionWebhooks:
    enabled: false
    patch:
      resources:
        requests:
          cpu: 20m
          memory: 64Mi
        limits:
          memory: 64Mi
    createSecretJob:
      resources:
        requests:
          cpu: 20m
          memory: 32Mi
        limits:
          memory: 64Mi
