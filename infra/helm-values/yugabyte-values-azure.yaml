replicas:
  master: 3
  tserver: 3

# ── Raft quorum ───────────────────────────────────────────────────────────────
# 3-node strong consistency: survives 1 node failure without losing quorum.
# All edge cells connect via YUGABYTE_DB_URL → yb-tservers.payment.svc.cluster.local:5433
# The tserver service load-balances connections across all 3 tserver pods.
conf:
  tserver:
    flags:
      replication_factor: 3
      # Connection capacity: 3 edge cells × 20 HikariCP connections = 60 max
      # Each tserver handles ~20. Well within defaults.
      ysql_max_connections: 300

# ── Pod anti-affinity: force 1 tserver per edgedbpool node ───────────────────
# Without this, all 3 tservers could schedule on the same node — defeating
# the entire point of the 3-node edgedbpool Raft quorum.
affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app
              operator: In
              values:
                - yb-tserver
        topologyKey: kubernetes.io/hostname

# ── Resources per node (edgedbpool: D8s_v5 = 8 vCPU / 32GB) ─────────────────
# One master + one tserver per node.
# Combined per-node: 2500m CPU request, 7Gi RAM request (well within 8vCPU/32GB)
resource:
  master:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  tserver:
    requests:
      cpu: 2000m
      memory: 6Gi   # bumped from 4Gi: YSQL shared_buffers + connection pool buffers
    limits:
      cpu: 4000m
      memory: 10Gi

# ── Storage ───────────────────────────────────────────────────────────────────
storage:
  master:
    size: 10Gi    # metadata only — small is fine
  tserver:
    size: 100Gi   # idempotency keys + YSQL data

# ── Node placement ────────────────────────────────────────────────────────────
# Dedicated edgedbpool: 3 fixed D8s_v5 nodes, label pool=edgedb.
# This pool exists solely for YugabyteDB — no other workloads scheduled here.
nodeSelector:
  pool: edgedb

# ── Observability ─────────────────────────────────────────────────────────────
metrics:
  enabled: false  # enable when Prometheus stack is deployed
