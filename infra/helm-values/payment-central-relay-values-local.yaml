
redis:
  url: redis://redis-master:6379
kafka:
  bootstrapServers: kafka.payment.svc.cluster.local:9092
spring:
  profile: local
serviceMonitor:
  enabled: true
  labels:
    release: prometheus-stack
  path: /actuator/prometheus
  interval: 30s
  scrapeTimeout: 10s
replicaCount: 1
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: External
      external:
        metric:
          name: central_outbox_backlog_external
        target:
          type: Value
          value: "5000"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 120
      selectPolicy: Max
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
resources:
  requests: {cpu: "150m", memory: "256Mi"}
  limits: {cpu: "500m", memory: "768Mi"}
