# infra/helm-values/redis-values-local.yaml
architecture: standalone
auth:
  enabled: false
image:
  registry: docker.io
  repository: bitnamisecure/redis
  tag: latest
  pullPolicy: IfNotPresent
master:
  resources:
    requests:
      cpu: "1000m"
      memory: "2Gi"
    limits:
      cpu: "4000m"
      memory: "8Gi"
  persistence:
    enabled: true
    size: 50Gi
  # Probes: give Redis time when busy
  startupProbe:
    enabled: true
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 90 # ~7.5 min (cold start / disk busy)
  readinessProbe:
    periodSeconds: 5
    timeoutSeconds: 10
    failureThreshold: 12 # ~1 min
  livenessProbe:
    periodSeconds: 5
    timeoutSeconds: 10
    failureThreshold: 12
  # Production Redis: enable persistence and increase memory bound
  extraFlags:
    - "--appendonly yes"
    - "--maxmemory 6gb"
    - "--maxmemory-policy allkeys-lru"
    - "--tcp-keepalive 30"
    - "--io-threads 4"
    - "--io-threads-do-reads yes"
    - "--latency-tracking yes"
  nodeSelector:
    pool: central
# Don’t load a ConfigMap to avoid conflicts
# master.existingConfigmap: <REMOVE THIS LINE>
global:
  security:
    allowInsecureImages: true
metrics:
  enabled: false
