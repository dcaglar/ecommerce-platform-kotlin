replicaCount: 1

auth:
  adminUser: admin
  adminPassword: adminpassword
postgresql:
  enabled: true
  auth:
    username: bn_keycloak
    password: bitnami
    database: bitnami_keycloak
    # leave ports at defaults (5432). Do NOT override.
  primary:
    nodeSelector:
      pool: central
    persistence:
      enabled: true
      size: 50Gi
service:
  type: LoadBalancer
  ports:
    http: 8080
# single-node cache; also blank out KC_CACHE_STACK so no jdbc-ping surprise
extraEnvVars:
  - name: KC_CACHE
    value: "local"
  - name: KC_CACHE_STACK
    value: "kubernetes"
  - name: KC_PROXY
    value: "edge"
  # Configure hostname to use cluster-internal DNS so JWT issuer matches payment service config
  # This ensures tokens have issuer: http://keycloak:8080/realms/ecommerce-platform
  - name: KC_HOSTNAME
    value: "keycloak"
  - name: KC_HOSTNAME_PORT
    value: "8080"
  - name: KC_HOSTNAME_STRICT
    value: "false"
  # KEYCLOAK_ADMIN and KEYCLOAK_ADMIN_PASSWORD are managed by auth.adminUser/adminPassword above.
  # Do NOT set them here — the Bitnami chart injects them via secretKeyRef, and a duplicate
  # plain 'value:' entry causes: "may not be specified when value is not empty".
resources:
  requests:
    memory: 1Gi
    cpu: 1000m
  limits:
    memory: 4Gi
    cpu: 2000m
livenessProbe:
  enabled: true
  initialDelaySeconds: 300
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
readinessProbe:
  enabled: true
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
nodeSelector:
  pool: central
