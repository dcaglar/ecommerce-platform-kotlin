replicaCount: 1

auth:
  adminUser: admin
  adminPassword: adminpassword
postgresql:
  enabled: true
  auth:
    username: bn_keycloak
    password: bitnami
    database: bitnami_keycloak
    # leave ports at defaults (5432). Do NOT override.
  primary:
    nodeSelector:
      pool: central
    persistence:
      enabled: true
      size: 50Gi
service:
  type: ClusterIP
  ports:
    http: 8080
# single-node cache; also blank out KC_CACHE_STACK so no jdbc-ping surprise
extraEnvVars:
  - name: KC_CACHE
    value: "local"
  - name: KC_CACHE_STACK
    value: "kubernetes"
  - name: KC_PROXY
    value: "edge"
  - name: KC_HTTP_RELATIVE_PATH
    value: "/auth"
  # Configure hostname to use cluster-internal DNS so JWT issuer matches payment service config
  # This ensures tokens have issuer: http://keycloak:8080/realms/ecommerce-platform
  - name: KC_HOSTNAME
    value: "keycloak"
  - name: KC_HOSTNAME_PORT
    value: "8080"
  - name: KC_HOSTNAME_STRICT
    value: "false"
  # KEYCLOAK_ADMIN and KEYCLOAK_ADMIN_PASSWORD are managed by auth.adminUser/adminPassword above.
  # Do NOT set them here — the Bitnami chart injects them via secretKeyRef, and a duplicate
  # plain 'value:' entry causes: "may not be specified when value is not empty".
resources:
  requests:
    memory: 1Gi
    cpu: 1000m
  limits:
    memory: 4Gi
    cpu: 2000m
livenessProbe:
  enabled: true
  initialDelaySeconds: 300
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
readinessProbe:
  enabled: true
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
nodeSelector:
  pool: central

ingress:
  enabled: true
  ingressClassName: nginx
  pathType: ImplementationSpecific
  # hostname is mandatory in the Bitnami chart — set to placeholder to satisfy the template.
  # The actual routing is done by extraRules below (catch-all, no host restriction).
  hostname: "placeholder.local"
  # Disable the default path rule rendered from hostname above
  path: "/this-path-will-never-match"
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/load-balance: "ewma"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/upstream-keepalive-timeout: "120"
    nginx.ingress.kubernetes.io/upstream-keepalive-connections: "200"
    nginx.ingress.kubernetes.io/limit-connections: "350"
  # Catch-all rule — routes /auth regardless of Host header (raw IP access or any DNS name)
  extraRules:
    - http:
        paths:
          - path: "/auth(/|$)(.*)"
            pathType: ImplementationSpecific
            backend:
              service:
                name: keycloak
                port:
                  number: 80
