spring:
  profile: "azure"
keda:
  enabled: true
  minReplicaCount: 1
  maxReplicaCount: 3
  pollingInterval: 15
  cooldownPeriod: 120
  triggers:
    - type: cpu
      metricType: Utilization
      metadata:
        value: "85"
        containerName: "payment-service"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      selectPolicy: Max
      policies:
        - type: Pods
          value: 1 # Add 1 pod at a time
          periodSeconds: 45 # Wait 45s between steps to allow JIT/warmup
    scaleDown:
      # "The Patience Window": Keep pods for 5 mins after load drops.
      # Prevents killing pods during small traffic dips.
      stabilizationWindowSeconds: 300
      selectPolicy: Max
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
paymentService:
  image:
    repository: dcaglar1987/payment-service
    tag: latest
    pullPolicy: Always
  jvmOpts: "-XX:+UseG1GC -XX:MaxRAMPercentage=60"
  resources:
    requests: {cpu: "1500m", memory: "2Gi"}
    limits: {cpu: "2500m", memory: "3Gi"}
redis:
  url: "redis://redis-master:6379"
ingress:
  enabled: true
  appPath: "/api/v1/payments"
  appPort: 8080
  healthPath: "/healthz"
  healthPort: 9000

  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    # ── Snowflake Cell Router ─────────────────────────────────────────────────
    # Mirrors PublicIdCodec.kt (Base64URL, big-endian 8 bytes, no padding) and
    # SnowflakeCore.kt (NODE_SHIFT=12, NODE_MASK=31).
    #
    # Flow for POST /api/v1/payments/pi_{base64url}/authorize:
    #   1. Extract base64url token from URL path
    #   2. Re-add stripped padding + swap URL-safe chars → standard Base64
    #   3. ngx.decode_base64 → 8 raw bytes
    #   4. Parse big-endian unsigned 64-bit integer (two 32-bit halves)
    #   5. nodeId = floor(lo / 4096) % 32   [ = (id >> 12) & 0x1F ]
    #   6. Set $cell_target = payment-edge-cell-<nodeId>.payment-edge-cell-headless.payment.svc.cluster.local
    #
    # Non-matching paths (e.g. POST /api/v1/payments) fall through unchanged.
    # ─────────────────────────────────────────────────────────────────────────
    nginx.ingress.kubernetes.io/configuration-snippet: |
      if ($uri = "/healthz") {
        rewrite ^/healthz$ /actuator/health break;
      }
      set $cell_target "";
      access_by_lua_block {
        local uri = ngx.var.uri

        -- Only intercept paths that carry a paymentIntentId
        local b64 = string.match(uri, "^/api/v1/payments/pi_([A-Za-z0-9_%-]+)")
        if not b64 then
          return  -- initial POST /payments or unrelated path — pass through
        end

        -- Step 1: URL-safe Base64 → standard Base64
        b64 = string.gsub(b64, "-", "+")
        b64 = string.gsub(b64, "_", "/")

        -- Step 2: Re-add PKCS#7 padding that PublicIdCodec strips
        local pad = #b64 % 4
        if pad == 2 then b64 = b64 .. "=="
        elseif pad == 3 then b64 = b64 .. "="
        end

        -- Step 3: Decode → 8 raw bytes (big-endian signed Long)
        local raw = ngx.decode_base64(b64)
        if not raw or #raw ~= 8 then
          ngx.log(ngx.WARN, "[cell-router] decode failed for uri=", uri)
          return  -- fall through to default upstream
        end

        -- Step 4: Reconstruct 64-bit integer from big-endian bytes
        --   We work in two 32-bit halves to stay within Lua 5.1 integer precision.
        --   hi = bytes[1..4],  lo = bytes[5..8]
        local b = string.byte
        local lo = b(raw,5) * 16777216   -- 0x01000000
                 + b(raw,6) * 65536      -- 0x00010000
                 + b(raw,7) * 256        -- 0x00000100
                 + b(raw,8)

        -- Step 5: nodeId = (lo >> 12) & 31  (sequence=12bits, node=5bits)
        local node_id = math.floor(lo / 4096) % 32

        -- Step 6: Route to exact StatefulSet pod via headless service DNS
        ngx.var.cell_target = "payment-edge-cell-" .. node_id
          .. ".payment-edge-cell-headless.payment.svc.cluster.local"

        ngx.log(ngx.INFO,
          "[cell-router] uri=", uri,
          " node_id=", node_id,
          " target=", ngx.var.cell_target)
      }



config:
  KEYCLOAK_ISSUER_URL: "http://keycloak:8080/realms/ecommerce-platform"
  EDGE_DB_URL: "jdbc:postgresql://localhost:5432/edge-db?options=-c%20timezone=UTC"
  EDGE_DB_NAME: "edge-db"
serviceMonitor:
  enabled: true
