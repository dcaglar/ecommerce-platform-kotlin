apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "payment-edge-cell.fullname" . }}
  labels:
    {{- include "payment-edge-cell.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "payment-edge-cell.fullname" . }}-headless
  updateStrategy:
    type: RollingUpdate
  replicas: {{ if (and .Values.keda (default false .Values.keda.enabled)) }}{{ .Values.keda.minReplicaCount | default 1 }}{{ else }}1{{ end }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: {{ include "payment-edge-cell.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "payment-edge-cell.fullname" . }}
      annotations:
        rollout/reboot: "{{ now | unixEpoch }}"
    spec:
      terminationGracePeriodSeconds: 120
      {{- if .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml .Values.topologySpreadConstraints | nindent 8 }}
      {{- end }}
      initContainers:
        - name: edge-db
          image: postgres:15
          restartPolicy: Always   # <--- K8s 1.28
          readinessProbe:
            initialDelaySeconds: 10
            periodSeconds: 5
            exec:
                command:
                  - psql
                  - -U
                  - postgres
                  - -d
                  - edge-db
                  - -tAc
                  - "SELECT 1 FROM databasechangelog WHERE id = '20260208-optimize-idempotency-vacuum' AND author = 'dogancaglar' AND exectype = 'EXECUTED';"
          volumeMounts:
            - name: db-init-scripts
              mountPath: /docker-entrypoint-initdb.d
          envFrom:
            - secretRef:
              name: edge-cell-credentials
            - configMapRef:
              name: edge-cell-config
          env:
            - name: POSTGRES_DB
              valueFrom: {configMapKeyRef: {name: edge-cell-config, key: EDGE_DB_NAME}}
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom: {secretKeyRef: {name: edge-cell-credentials, key: EDGE_DB_POSTGRES_PASSWORD}}
        - name: liquibase-migration
          image: liquibase/liquibase:4.24.0 # <--- The official vanilla image
          env:
              - name: LIQUIBASE_COMMAND_URL
                valueFrom: {configMapKeyRef: {name: edge-cell-config, key: EDGE_DB_URL}}
              - name: LIQUIBASE_COMMAND_USERNAME
                valueFrom: {secretKeyRef: {name: edge-cell-credentials, key: EDGE_DB_PAYMENT_SERVICE_USERNAME}}
              - name: LIQUIBASE_COMMAND_PASSWORD
                valueFrom: {secretKeyRef: {name: edge-cell-credentials, key: EDGE_DB_PAYMENT_SERVICE_PASSWORD}}
            # Point Liquibase at the extracted files on the shared volume
          args: ["--search-path=/shared-workspace", "update", "--changelog-file=changelog.edge.xml"]
          volumeMounts:
            - name: liquibase-workspace
              mountPath: /shared-workspace
      containers:
        - name: payment-service
          image: "{{ .Values.paymentService.image.repository }}:{{ .Values.paymentService.image.tag }}"
          imagePullPolicy: {{ .Values.paymentService.image.pullPolicy | default "Always" }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "{{ .Values.paymentService.jvmOpts }}"
            - name: SPRING_PROFILES_ACTIVE
              value: "{{ .Values.spring.profile | default "local" }}"
            - name: SPRING_DATA_REDIS_URL
              value: "{{ .Values.redis.url | default "redis://localhost:6379" }}"
          resources:
            {{- toYaml .Values.paymentService.resources | nindent 12 }}
      volumes:
        - name: db-init-scripts
          configMap:
            name: edge-db-init-configmap
        - name: liquibase-workspace
          configMap:
            name: edge-db-changelog-configmap