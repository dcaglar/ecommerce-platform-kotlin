apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "central-db.fullname" . }}
  labels:
    app: {{ include "central-db.fullname" . }}
spec:
  serviceName: {{ include "central-db.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "central-db.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "central-db.fullname" . }}
      annotations:
        rollout/reboot: "{{ now | unixEpoch }}"
    spec:
      terminationGracePeriodSeconds: 60
      initContainers:
        - name: liquibase-migration
          image: liquibase/liquibase:4.24.0
          env:
            - name: LIQUIBASE_COMMAND_URL
              value: "jdbc:postgresql://localhost:5432/central-db?options=-c%20timezone=UTC"
            - name: LIQUIBASE_COMMAND_USERNAME
              valueFrom: {secretKeyRef: {name: central-hub-credentials, key: CENTRAL_DB_PAYMENT_CONSUMERS_USERNAME}}
            - name: LIQUIBASE_COMMAND_PASSWORD
              valueFrom: {secretKeyRef: {name: central-hub-credentials, key: CENTRAL_DB_PAYMENT_CONSUMERS_PASSWORD}}
          args: ["update", "--changelog-file=/shared-workspace/changelog.central.xml"]
          volumeMounts:
            - name: liquibase-workspace
              mountPath: /shared-workspace
      containers:
        - name: central-db
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          ports:
            - containerPort: 5432
              name: postgres
          args:
            {{- range $key, $value := .Values.postgres.config }}
            - "-c"
            - "{{ $key }}={{ $value }}"
            {{- end }}
          readinessProbe:
            exec:
              command:
                - psql
                - -U
                - postgres
                - -d
                - central-db
                - -tAc
                - "SELECT 1 FROM databasechangelog WHERE id = '2026-06-09-create-transfers-table' AND author = 'dogancaglar' AND exectype = 'EXECUTED';"
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: db-init-scripts
              mountPath: /docker-entrypoint-initdb.d
            - name: data
              mountPath: /var/lib/postgresql/data
          envFrom:
            - secretRef:
                name: central-hub-credentials
                optional: true
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: central-hub-config
                  key: CENTRAL_DB_NAME
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: central-hub-credentials
                  key: CENTRAL_DB_POSTGRES_PASSWORD
            # Pass the credentials the script needs to create
            - name: CENTRAL_DB_PAYMENT_CONSUMERS_USERNAME
              valueFrom: {secretKeyRef: {name: central-hub-credentials, key: CENTRAL_DB_PAYMENT_CONSUMERS_USERNAME}}
            - name: CENTRAL_DB_PAYMENT_CONSUMERS_PASSWORD
              valueFrom: {secretKeyRef: {name: central-hub-credentials, key: CENTRAL_DB_PAYMENT_CONSUMERS_PASSWORD}}
            - name: CENTRAL_DB_PAYMENT_CENTRAL_RELAY_USERNAME
              valueFrom: {secretKeyRef: {name: central-hub-credentials, key: CENTRAL_DB_PAYMENT_CENTRAL_RELAY_USERNAME}}
            - name: CENTRAL_DB_PAYMENT_CENTRAL_RELAY_PASSWORD
              valueFrom: {secretKeyRef: {name: central-hub-credentials, key: CENTRAL_DB_PAYMENT_CENTRAL_RELAY_PASSWORD}}
            - name: CENTRAL_DB_PAYMENT_EDGE_WORKERS_USERNAME
              valueFrom: {secretKeyRef: {name: central-hub-credentials, key: CENTRAL_DB_PAYMENT_EDGE_WORKERS_USERNAME}}
            - name: CENTRAL_DB_PAYMENT_EDGE_WORKERS_PASSWORD
              valueFrom: {secretKeyRef: {name: central-hub-credentials, key: CENTRAL_DB_PAYMENT_EDGE_WORKERS_PASSWORD}}
            - name: CENTRAL_DB_DUTY_USERNAME
              valueFrom: {secretKeyRef: {name: central-hub-credentials, key: CENTRAL_DB_DUTY_USERNAME}}
            - name: CENTRAL_DB_DUTY_PASSWORD
              valueFrom: {secretKeyRef: {name: central-hub-credentials, key: CENTRAL_DB_DUTY_PASSWORD}}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: db-init-scripts
          configMap:
            name: central-db-init-scripts
        - name: liquibase-workspace
          configMap:
            name: central-db-changelog-configmap
        - name: data
          emptyDir: {}
