apiVersion: v1
kind: Secret
metadata:
  name: central-db-init-secret
  namespace: {{.Release.Namespace}}
stringData:
  init-central-db.sh: |
    #!/bin/bash
    set -e
    
    POSTGRES_USER=${POSTGRES_USER:-"postgres"}
    POSTGRES_DB=${POSTGRES_DB:-"central-db"}
    export PGPASSWORD=$POSTGRES_PASSWORD

    echo "Creating payment_consumers user..."
  
    
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<EOSQL
        DO \$\$
        BEGIN
            IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = '$CENTRAL_DB_PAYMENT_CONSUMERS_USERNAME') THEN
                CREATE USER "$CENTRAL_DB_PAYMENT_CONSUMERS_USERNAME" WITH PASSWORD '$CENTRAL_DB_PAYMENT_CONSUMERS_PASSWORD';
            END IF;
        END
        \$\$;
        -- Permissions are generally safe to re-run, but if you want them truly safe:
        GRANT ALL ON SCHEMA public TO "$CENTRAL_DB_PAYMENT_CONSUMERS_USERNAME";
                GRANT CREATE ON SCHEMA public TO "$CENTRAL_DB_PAYMENT_CONSUMERS_USERNAME";
                GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO "$CENTRAL_DB_PAYMENT_CONSUMERS_USERNAME";
                GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO "$CENTRAL_DB_PAYMENT_CONSUMERS_USERNAME";

                -- 🔧 Per-role default session settings (picked up on new connections)
                ALTER ROLE "$CENTRAL_DB_PAYMENT_CONSUMERS_USERNAME" SET statement_timeout = '2s';
                ALTER ROLE "$CENTRAL_DB_PAYMENT_CONSUMERS_USERNAME" SET lock_timeout      = '250ms';
                ALTER ROLE "$CENTRAL_DB_PAYMENT_CONSUMERS_USERNAME" SET idle_in_transaction_session_timeout = '0';
    EOSQL

    echo "Creating payment-central-relay user..."
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
    
        DO \$\$
        BEGIN
            IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = '$CENTRAL_DB_PAYMENT_CENTRAL_RELAY_USERNAME') THEN
                CREATE USER "$CENTRAL_DB_PAYMENT_CENTRAL_RELAY_USERNAME" WITH PASSWORD '$CENTRAL_DB_PAYMENT_CENTRAL_RELAY_PASSWORD';
            END IF;
        END
        \$\$;
    
        GRANT ALL ON SCHEMA public TO "$CENTRAL_DB_PAYMENT_CENTRAL_RELAY_USERNAME";
        GRANT CREATE ON SCHEMA public TO "$CENTRAL_DB_PAYMENT_CENTRAL_RELAY_USERNAME";
        GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO "$CENTRAL_DB_PAYMENT_CENTRAL_RELAY_USERNAME";
        GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO "$CENTRAL_DB_PAYMENT_CENTRAL_RELAY_USERNAME";
    EOSQL

    echo "Creating payment_edge_Workers user..."
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
      DO \$\$
        BEGIN
            IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = '$CENTRAL_DB_PAYMENT_EDGE_WORKERS_USERNAME') THEN
                CREATE USER "$CENTRAL_DB_PAYMENT_EDGE_WORKERS_USERNAME" WITH PASSWORD '$CENTRAL_DB_PAYMENT_EDGE_WORKERS_PASSWORD';
            END IF;
        END
        \$\$;
    
        GRANT ALL ON SCHEMA public TO "$CENTRAL_DB_PAYMENT_EDGE_WORKERS_USERNAME";
        GRANT CREATE ON SCHEMA public TO "$CENTRAL_DB_PAYMENT_EDGE_WORKERS_USERNAME";
        GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO "$CENTRAL_DB_PAYMENT_EDGE_WORKERS_USERNAME";
        GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO "$CENTRAL_DB_PAYMENT_EDGE_WORKERS_USERNAME";
    EOSQL

    echo "Creating duty user..."
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
    
    DO \$\$
        BEGIN
            IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = '$CENTRAL_DB_DUTY_USERNAME') THEN
                CREATE USER "$CENTRAL_DB_DUTY_USERNAME" WITH PASSWORD '$CENTRAL_DB_DUTY_PASSWORD';
            END IF;
        END
        \$\$;
    
        GRANT ALL ON SCHEMA public TO "$CENTRAL_DB_DUTY_USERNAME";
        GRANT CREATE ON SCHEMA public TO "$CENTRAL_DB_DUTY_USERNAME";
        GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO "$CENTRAL_DB_DUTY_USERNAME";
        GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO "$CENTRAL_DB_DUTY_USERNAME";
        GRANT "$CENTRAL_DB_PAYMENT_CONSUMERS_USERNAME" TO "$CENTRAL_DB_DUTY_USERNAME";
    EOSQL

    echo "Creating maintenance user..."
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
    
    DO \$\$
        BEGIN
            IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = '$CENTRAL_DB_MAINTENANCE_USERNAME') THEN
                CREATE USER "$CENTRAL_DB_MAINTENANCE_USERNAME" WITH PASSWORD '$CENTRAL_DB_MAINTENANCE_PASSWORD';
            END IF;
        END
        \$\$;
    
        GRANT ALL ON SCHEMA public TO "$CENTRAL_DB_MAINTENANCE_USERNAME";
        GRANT CREATE ON SCHEMA public TO "$CENTRAL_DB_MAINTENANCE_USERNAME";
        GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO "$CENTRAL_DB_MAINTENANCE_USERNAME";
        GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO "$CENTRAL_DB_MAINTENANCE_USERNAME";
        GRANT "$CENTRAL_DB_PAYMENT_CONSUMERS_USERNAME" TO "$CENTRAL_DB_MAINTENANCE_USERNAME";
    EOSQL

    echo "Configuring default privileges for future tables..."
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
        -- When Liquibase creates tables/sequences (as payment_consumers), automatically grant access to edge_workers, relay, duty, and maintenance
        ALTER DEFAULT PRIVILEGES FOR ROLE "$CENTRAL_DB_PAYMENT_CONSUMERS_USERNAME" IN SCHEMA public GRANT ALL PRIVILEGES ON TABLES TO "$CENTRAL_DB_PAYMENT_EDGE_WORKERS_USERNAME";
        ALTER DEFAULT PRIVILEGES FOR ROLE "$CENTRAL_DB_PAYMENT_CONSUMERS_USERNAME" IN SCHEMA public GRANT ALL PRIVILEGES ON SEQUENCES TO "$CENTRAL_DB_PAYMENT_EDGE_WORKERS_USERNAME";
        
        ALTER DEFAULT PRIVILEGES FOR ROLE "$CENTRAL_DB_PAYMENT_CONSUMERS_USERNAME" IN SCHEMA public GRANT ALL PRIVILEGES ON TABLES TO "$CENTRAL_DB_PAYMENT_CENTRAL_RELAY_USERNAME";
        ALTER DEFAULT PRIVILEGES FOR ROLE "$CENTRAL_DB_PAYMENT_CONSUMERS_USERNAME" IN SCHEMA public GRANT ALL PRIVILEGES ON SEQUENCES TO "$CENTRAL_DB_PAYMENT_CENTRAL_RELAY_USERNAME";

        ALTER DEFAULT PRIVILEGES FOR ROLE "$CENTRAL_DB_PAYMENT_CONSUMERS_USERNAME" IN SCHEMA public GRANT ALL PRIVILEGES ON TABLES TO "$CENTRAL_DB_DUTY_USERNAME";
        ALTER DEFAULT PRIVILEGES FOR ROLE "$CENTRAL_DB_PAYMENT_CONSUMERS_USERNAME" IN SCHEMA public GRANT ALL PRIVILEGES ON SEQUENCES TO "$CENTRAL_DB_DUTY_USERNAME";

        ALTER DEFAULT PRIVILEGES FOR ROLE "$CENTRAL_DB_PAYMENT_CONSUMERS_USERNAME" IN SCHEMA public GRANT ALL PRIVILEGES ON TABLES TO "$CENTRAL_DB_MAINTENANCE_USERNAME";
        ALTER DEFAULT PRIVILEGES FOR ROLE "$CENTRAL_DB_PAYMENT_CONSUMERS_USERNAME" IN SCHEMA public GRANT ALL PRIVILEGES ON SEQUENCES TO "$CENTRAL_DB_MAINTENANCE_USERNAME";
    EOSQL

    echo "✅ Central DB initialized with all required users."
