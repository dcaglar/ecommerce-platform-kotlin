apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "payment-consumers.fullname" . }}
  labels:
    {{- include "payment-consumers.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "payment-consumers.fullname" . }}
  podManagementPolicy: OrderedReady
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ include "payment-consumers.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "payment-consumers.fullname" . }}
        {{- include "payment-consumers.labels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 60
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - payment-central-relay
                topologyKey: "kubernetes.io/hostname"


      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: payment-consumers
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "{{ .Values.jvmOpts }}"
            - name: SPRING_PROFILES_ACTIVE
              value: "{{ .Values.spring.profile }}"
            - name: SPRING_DATA_REDIS_URL
              value: "{{ .Values.redis.url }}"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "{{ .Values.kafka.bootstrapServers }}"
            - name: CENTRAL_DB_URL
              valueFrom: { configMapKeyRef: { name: central-hub-config, key: CENTRAL_DB_URL } }
            - name: CENTRAL_DB_PAYMENT_CONSUMERS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: central-hub-credentials
                  key: CENTRAL_DB_PAYMENT_CONSUMERS_USERNAME
            - name: CENTRAL_DB_PAYMENT_CONSUMERS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: central-hub-credentials
                  key: CENTRAL_DB_PAYMENT_CONSUMERS_PASSWORD
          startupProbe:
            httpGet: {path: /actuator/health/liveness, port: http}
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet: {path: /actuator/health/readiness, port: http}
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          livenessProbe:
            httpGet: {path: /actuator/health/liveness, port: http}
            periodSeconds: 15
            failureThreshold: 4
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}