apiVersion: v1
kind: Secret
metadata:
  name: central-hub-credentials
type: Opaque
stringData:
  {{- /* Pluck only the Central-related keys */}}
    {{- $centralKeys := pick .Values   "CENTRAL_DB_PAYMENT_CONSUMERS_USERNAME" "CENTRAL_DB_PAYMENT_CONSUMERS_PASSWORD" "CENTRAL_DB_PAYMENT_CENTRAL_RELAY_USERNAME"   "CENTRAL_DB_PAYMENT_CENTRAL_RELAY_PASSWORD"  "CENTRAL_DB_PAYMENT_EDGE_WORKERS_USERNAME"   "CENTRAL_DB_PAYMENT_EDGE_WORKERS_USERNAME" "CENTRAL_DB_DUTY_USERNAME"  "CENTRAL_DB_DUTY_PASSWORD" "CENTRAL_DB_POSTGRES_PASSWORD" }}
    {{- toYaml $centralKeys | nindent 2 }}
