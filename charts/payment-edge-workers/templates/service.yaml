apiVersion: v1
kind: Service
metadata:
  name: {{ include "payment-edge-workers.fullname" . }}-headless
  labels:
    {{- include "payment-edge-workers.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 8081
      targetPort: http-worker
      protocol: TCP
      name: http-worker
    - port: 9001
      targetPort: mgmt-worker
      protocol: TCP
      name: mgmt-worker
  selector:
    {{- include "payment-edge-workers.selectorLabels" . | nindent 4 }}
