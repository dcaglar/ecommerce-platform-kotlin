apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "payment-edge-workers.fullname" . }}
  labels:
    {{- include "payment-edge-cell.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "payment-edge-cell.fullname" . }}-headless
  updateStrategy:
    type: RollingUpdate
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: {{ include "payment-edge-cell.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "payment-edge-cell.fullname" . }}
      annotations:
        rollout/reboot: "{{ now | unixEpoch }}"
    spec:
      {{- if .Values.serviceAccount }}
      serviceAccountName: {{ .Values.serviceAccount.name | default "default" }}
      {{- end }}
      terminationGracePeriodSeconds: 120
      {{- if .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml .Values.topologySpreadConstraints | nindent 8 }}
      {{- end }}
      containers:
        # 2. THE LOCAL WORKER (Forwards to Central)
        - name: payment-edge-workers
          image: "{{ .Values.edgeWorker.image.repository }}:{{ .Values.edgeWorker.image.tag }}"
          imagePullPolicy: {{ .Values.edgeWorker.image.pullPolicy }}
          ports:
            - name: http-worker
              containerPort: 8081
              protocol: TCP
            - name: mgmt-worker
              containerPort: 9001
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "{{ .Values.spring.profile }}"
            - name: SPRING_DATA_REDIS_URL
              value: "{{ .Values.redis.url }}"
            - name: EDGE_DB_NAME
              valueFrom: {configMapKeyRef: {name: edge-cell-config, key: EDGE_DB_NAME}}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: EDGE_CELL_BASE_URL
              value: "{{ include "payment-edge-cell.fullname" . }}"
            - name: EDGE_CELL_HEADLESS_SERVICE
              value: "{{ include "payment-edge-cell.fullname" . }}-headless.{{ .Release.Namespace }}.svc.cluster.local"
            - name: EDGE_DB_PAYMENT_EDGE_WORKERS_USERNAME
              valueFrom: {secretKeyRef: {name: edge-cell-credentials, key: EDGE_DB_PAYMENT_EDGE_WORKERS_USERNAME}}
            - name: EDGE_DB_PAYMENT_EDGE_WORKERS_PASSWORD
              valueFrom: {secretKeyRef: {name: edge-cell-credentials, key: EDGE_DB_PAYMENT_EDGE_WORKERS_PASSWORD}}
            - name: EDGE_DB_DUTY_USERNAME
              valueFrom: {secretKeyRef: {name: edge-cell-credentials, key: EDGE_DB_DUTY_USERNAME}}
            - name: EDGE_DB_DUTY_PASSWORD
              valueFrom: {secretKeyRef: {name: edge-cell-credentials, key: EDGE_DB_DUTY_PASSWORD}}
            - name: CENTRAL_DB_URL
              value: "{{ .Values.config.CENTRAL_DB_URL }}"
            - name: CENTRAL_DB_PAYMENT_EDGE_WORKERS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: central-db-credentials
                  key: CENTRAL_DB_PAYMENT_EDGE_WORKERS_USERNAME
            - name: CENTRAL_DB_PAYMENT_EDGE_WORKERS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: central-db-credentials
                  key: CENTRAL_DB_PAYMENT_EDGE_WORKERS_PASSWORD
          startupProbe:
            httpGet: {path: /actuator/health/liveness, port: 9001}
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet: {path: /actuator/health/readiness, port: 9001}
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          livenessProbe:
            httpGet: {path: /actuator/health/liveness, port: 9001}
            periodSeconds: 15
            failureThreshold: 4
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values
                .edgeWorker.resources | nindent 12}}
