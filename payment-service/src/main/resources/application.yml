server:
  port: 8080
  shutdown: graceful
  tomcat:
    threads:
      max: 250          # The maximum number of concurrent requests actively processing
      min-spare: 50     # The minimum threads kept alive for instant response
    max-connections: 8192 # Keep-alive sockets (default)
    accept-count: 100   # The waiting room queue size
    connection-timeout: 20000
#  Here is the step-by-step, didactic masterclass on calculating your pool sizes using Little's Law (N=λ×W).
#
#  The secret to mastering this is realizing that 200 Concurrent Users (Virtual Users) is NOT the same thing as 200 Requests Per Second. We must calculate how fast those 200 users are actually clicking!
#
#  For this calculation, we will assume both of your endpoints wait on the external PSP Simulator for 0.8 seconds (800ms).
#
#Step 1: Calculate Your True Traffic (Requests Per Second)
#First, we calculate how long it takes one user to complete their entire flow (The Cycle Time):
#
#Endpoint 1 Response Time: 0.8s
#User Wait/Sleep Time: 0.2s
#Endpoint 2 Response Time: 0.8s
#Total Cycle Time: 0.8 + 0.2 + 0.8 = 1.8 seconds
#Next, we calculate how many cycles your 200 Virtual Users (VUs) can complete per second:
#
#Flows Per Second: 200 VUs / 1.8s = 111 Flows/sec
#Since there are 2 HTTP endpoints per flow:
#
#  Total HTTP Requests Per Second (λ
#  HTTP
#  ​
#): 111 * 2 = 222 HTTP req/sec
#Step 2: Calculate Tomcat Threads (The Web Layer)
#  A Tomcat thread is blocked for the entire duration of the HTTP request, which means it is held hostage during the 0.8s PSP Simulator wait.
#
#Target Load (λ): 222 HTTP req/sec
#Time Held (W): 0.8 seconds
#Calculation: 222 * 0.8 = 177.6 Threads
#The Verdict: You mathematically need 178 Tomcat threads to process this traffic without queuing. Setting server.tomcat.threads.max: 250 gives you a perfect ~40% buffer (shock absorber) for latency spikes.
#
#Step 3: Calculate HikariCP Connections (The Database Layer)
#  Because you properly release the database connection during the PSP wait, the database connection is only held for the raw query execution time (5ms).
#
#HTTP Target Load: 222 HTTP req/sec
#Queries Per Request: 5 queries
#Database Target Load (λ): 222 * 5 = 1,110 DB queries/sec
#Time Held (W): 0.005 seconds (5ms)
#Calculation: 1,110 * 0.005 = 5.55 Connections
#The Verdict: You mathematically need just 6 database connections to execute over a thousand queries per second. Setting maximum-pool-size: 15 gives you a massive 150% buffer.
#
#  Summary Checklist for 200 Concurrent Users
#To smoothly run this specific k6 load test, your application.yml should look like this:

#server:
#  tomcat:
#    threads:
#      max: 250         # 178 needed + 72 buffer
#app:
#  datasource:
#    web:
#      maximum-pool-size: 15   # 6 needed + 9 buffer
spring:
  application:
    name: payment-service
  lifecycle:
    timeout-per-shutdown-phase: 30s
  jackson:
    time-zone: UTC
  data:
    redis:
      timeout: 10s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
          max-wait: 5000ms
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/changelog.edge.xml
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8180/realms/payment}

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.dogancaglar.common.db.entity
  type-handlers-package: com.dogancaglar.common.db.typehandler

management:
  server:
    port: 9000
  health:
    probes:
      enabled: true
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: "prometheus,metrics,health"
  endpoint:
    health:
      enabled: true
      show-details: always
    prometheus.enabled: true
  metrics:
    tags:
      application: payment-service
    enable:
      all: false
      tomcat.threads.current: true
      tomcat.threads.busy: true
      tomcat.threads.config.max: true
      http.server.requests: true
      redis_dirty_accounts_size: true
      redis_retry_zset_size: true
      tomcat.threads: true
      hikaricp.connections: true
      hikaricp.connections.acquire: true
      kafka.producer.topic.record.send: true
      process.cpu.usage: true
      jvm.threads.live: true
      jvm.memory.used: true
      jvm.memory.max: true
      jvm.gc.pause: true
      outbox_dispatched_total: true
      outbox_dispatch_failed_total: true
      outbox_event_backlog: true
      outbox_dispatcher_duration: true
    binders:
      tomcat:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
        outbox_dispatcher_duration: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99
        outbox_dispatcher_duration: 0.5,0.95,0.99
    export.prometheus.enabled: true

# Pool defaults for the web datasource — overrideable per environment
# These are production-safe defaults; tune in application-{profile}.yml if needed
app:
  datasource:
    web:
      driver-class-name: org.postgresql.Driver
      jdbc-url: ${SPRING_DATASOURCE_URL}
      username: ${SPRING_DATASOURCE_USERNAME}
      password: ${SPRING_DATASOURCE_PASSWORD}
      pool-name: web-pool
      maximum-pool-size: 12
      minimum-idle: 6
      connection-timeout: 5000
      validation-timeout: 1000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      connection-init-sql: "SET statement_timeout = '500ms'; SET lock_timeout = '250ms';"
  cache:
    ttl-seconds: 3600
  account-balance:
    delta-ttl-seconds: 300
    idempotency-ttl-seconds: 86400
    snapshot-interval: PT1M

outbox-dispatcher:
  thread-count: 2
  batch-size: 300
  pool-size: 2

db:
  web:
    statement-timeout-ms: 500
    lock-timeout-ms: 250
    idle-in-tx-timeout-ms: 0

stripe:
  api:
    api-key: ${STRIPE_API_KEY:sk_test_123}
    connect-timeout: 5000
    read-timeout: 30000

payments:
  id:
    epoch-millis: 1735689600000   # 2025-01-01T00:00:00Z
    region-id: 1                  # EU1

psp:
  gateway:
    type: SIMULATED               # Options: STRIPE, SIMULATED — override per environment
