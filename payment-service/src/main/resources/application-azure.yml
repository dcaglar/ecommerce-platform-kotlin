server:
  tomcat:
    threads:
      max: 250
      min-spare: 50
    max-connections: 4000
    accept-count: 500
    connection-timeout: 20000

spring:
  datasource:
    edge:
      # Single HikariCP pool — YugabyteDB removed (Phase 15). Idempotency in edge-db.
      url: ${EDGE_DB_URL}
      username: ${EDGE_DB_PAYMENT_SERVICE_USERNAME}
      password: ${EDGE_DB_PAYMENT_SERVICE_PASSWORD}
      maximum-pool-size: 60
      minimum-idle: 10
      connection-timeout: 5000
      validation-timeout: 1000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      connection-init-sql: "SET statement_timeout = '500ms'; SET lock_timeout = '250ms';"

  data:
    redis:
      url: ${SPRING_DATA_REDIS_URL}
      timeout: 10s
      lettuce:
        pool:
          max-active: 64
          max-idle: 32
          min-idle: 16
          max-wait: 5000ms

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URL}

db:
  web:
    statement-timeout-ms: 500
    lock-timeout-ms: 250
    idle-in-tx-timeout-ms: 0

stripe:
  api:
    api-key: ${STRIPE_API_KEY}:test
    connect-timeout: 5000
    read-timeout: 30000

psp:
  gateway:
    type: SIMULATED
  authorization:
    simulation:
      currentScenario: NORMAL
      scenarios:
        NORMAL:
          timeouts:
            enabled: true
            probability: 0
          latency:
            fast:
              probability: 0
              minMs: 100
              maxMs: 300
            moderate:
              probability: 100
              minMs: 300
              maxMs: 500
            slow:
              probability: 0
              minMs: 1000
              maxMs: 2000
          response:
            successful: 100
            retryable: 0
            statusCheck: 0
            nonRetryable: 0

logging:
  level:
    root: ERROR
    org.springframework: ERROR
    com.dogancaglar.paymentservice: ERROR
