app:
  kafka:
    concurrency:
      journal-entries: 16
      capture-commands: 8
      capture-submitted: 8
    # Azure: higher partition count than local (replication factor 3 for durability).
    specs:
      payment.psp.results:      { partitions: 24, replicas: 3, createDlq: true }
      journal.entries.recorded: { partitions: 48, replicas: 3, createDlq: true }
      gateway.capture.commands: { partitions: 24, replicas: 3, createDlq: true }
      gateway.capture.submitted: { partitions: 24, replicas: 3, createDlq: true }

spring:
  datasource:
    payment-consumers:
      # Env vars match secret injection from central-db-sops-secrets.yaml.
      url: ${CENTRAL_DB_URL}
      username: ${CENTRAL_DB_PAYMENT_CONSUMERS_USERNAME}
      password: ${CENTRAL_DB_PAYMENT_CONSUMERS_PASSWORD}
      hikari:
        # Azure: 40 connections (vs 20 local) to handle parallel consumer threads.
        maximum-pool-size: 40
        minimum-idle: 5
        connection-timeout: 15000
        validation-timeout: 15000
        idle-timeout: 600000
        max-lifetime: 1740000
        keepalive-time: 300000
        leak-detection-threshold: 60000
    account-snapshot-job:
      url: ${CENTRAL_DB_URL}
      username: ${CENTRAL_DB_PAYMENT_CONSUMERS_USERNAME}
      password: ${CENTRAL_DB_PAYMENT_CONSUMERS_PASSWORD}
      hikari:
        maximum-pool-size: 20
        minimum-idle: 2
        connection-timeout: 15000
        validation-timeout: 15000
        idle-timeout: 600000
        max-lifetime: 1740000
        keepalive-time: 300000
        leak-detection-threshold: 60000

  data:
    redis:
      url: ${SPRING_DATA_REDIS_URL}
      timeout: 10s
      lettuce:
        pool:
          max-active: 64
          max-idle: 32
          min-idle: 16
          max-wait: 5000ms

  kafka:
    consumer:
      isolation-level: read_committed
      enable-auto-commit: false
      # Azure: larger batches for throughput. 500 records (vs 120 local).
      max-poll-records: 500
      max-poll-interval: 300000
      fetch-min-bytes: 1048576
      fetch-max-wait: 100ms
      max-partition-fetch-bytes: 5242880
      fetch-max-bytes: 104857600
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: com.dogancaglar.common.kafka.serde.EventEnvelopeKafkaDeserializer
        partition.assignment.strategy: org.apache.kafka.clients.consumer.CooperativeStickyAssignor
    properties:
      security.protocol: PLAINTEXT
      session.timeout.ms: 45000


