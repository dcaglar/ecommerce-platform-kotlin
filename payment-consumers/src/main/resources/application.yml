              maxMs: 300
            slow:
              probability: 0
              minMs: 300
              maxMs: 600
          response:
            successful: 100
            retryable: 0
            nonRetryable: 0
        PEAK:
          timeouts:
            enabled: true
            probability: 25
          latency:
            fast:
              probability: 30
              minMs: 250
              maxMs: 500
            moderate:
              probability: 50
              minMs: 501
              maxMs: 1500
            slow:
              probability: 20
              minMs: 1501
              maxMs: 2500
          response:
            successful: 50
            retryable: 45
            statusCheck: 0
            nonRetryable: 5
        DEGRADED:
          timeouts:
            enabled: true
            probability: 30
