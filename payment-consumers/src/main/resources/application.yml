app:
  cache:
    ttl-seconds: 3600  # 1 hour redis TTL for PSP result cache
  kafka: # Kafka configuration for dynamic consumers
    specs:
      psp-result-queue:                           { partitions: 12, replicas: 1, createDlq: true }
      ledger_entries_recorded_topic:              { partitions: 24, replicas: 1, createDlq: true }
      capture-execution-queue:                    { partitions: 12, replicas: 1, createDlq: true }
      capture_psp_performed_queue:                { partitions: 12, replicas: 1, createDlq: true }
      internal-transfer-queue:                    { partitions: 12, replicas: 1, createDlq: true }


server:
  port: 8080
  tomcat:
    accesslog:
      enabled: true
      directory: /var/log/tomcat
      prefix: access_log
      suffix: .log
      pattern: '%h %l %u %t "%r" %s %b %D'
      buffered: true

spring:
  application:
    name: payment-consumers
  lifecycle:
    timeout-per-shutdown-phase: 45s
  jackson:
    time-zone: UTC
  datasource:
    url: ${SPRING_DATASOURCE_CENTRAL_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 1500
      validation-timeout: 1000
      idle-timeout: 600000
      max-lifetime: 1740000
      keepalive-time: 300000
      leak-detection-threshold: 60000
  kafka:
    consumer:
      isolation-level: read_committed
      enable-auto-commit: false
      max-poll-records: 120
      max-poll-interval: 240000
      fetch-min-bytes: 131072
      fetch-max-wait: 25ms
      max-partition-fetch-bytes: 1048576
      fetch-max-bytes: 33554432
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: com.dogancaglar.common.kafka.serde.EventEnvelopeKafkaDeserializer
        partition.assignment.strategy: org.apache.kafka.clients.consumer.CooperativeStickyAssignor
    properties:
      security.protocol: PLAINTEXT
      session.timeout.ms: 45000
  data:
    redis:
      url: ${SPRING_DATA_REDIS_URL:redis://localhost:6379}
      timeout: 10s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
          max-wait: 5000ms
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/changelog.central.xml

management:
  health:
    probes:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "prometheus,metrics,health"
  endpoint:
    health:
      enabled: true
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: payment-consumers
    enable:
      all: false
      hikaricp.connections: true
      hikaricp.connections.acquire: true
      process.cpu.usage: true
      jvm.threads.live: true
      jvm.memory.used: true
      jvm.memory.max: true
      jvm.gc.pause: true
      kafka.consumer.fetch.manager.records.lag: true
      kafka.consumer.fetch.manager.records.consumed: true
      kafka.consumer.fetch.manager.fetch.latency: true
      kafka.consumer.io.time: true
      kafka.consumer.records.lag.max: true
      kafka.consumer.fetch.latency.avg: true
      kafka.consumer.fetch.latency.max: true
      kafka.producer.batch.size.avg: true
      kafka.producer.batch.size.max: true
      kafka.producer.request.latency.avg: true
      kafka.producer.topic.record.send: true
      kafka.producer.request.latency.max: true
      kafka.producer.compression.rate.avg: true
      kafka.producer.record.send.total: true
      kafka.producer.record.error.total: true
      kafka.producer.record.retry.total: true
      kafka.producer.outgoing.byte.total: true
      kafka.producer.io.wait.time.total: true
      kafka.producer.bufferpool.wait.ratio: true
      kafka.producer.bufferpool.wait.time.total: true
      psp_calls_total: true
      psp_call_latency: true
      psp_queue_delay: true
      psp_exec_duration: true
      redis_retry_zset_size: true
      redis_retry_batch_size: true
      redis_retry_events_total: true
      redis_retry_dispatch_batch_seconds: true
      redis_retry_dispatch_event_seconds: true
      http.server.requests: true
      tomcat.threads: true
    distribution:
      percentiles-histogram:
        psp_call_latency: true
        redis_retry_dispatch_batch_seconds: true
        redis_retry_dispatch_event_seconds: true
        http.server.requests: true
      percentiles:
        psp_call_latency: 0.5,0.95,0.99
        redis_retry_dispatch_batch_seconds: 0.5,0.95,0.99
        redis_retry_dispatch_event_seconds: 0.5,0.95,0.99
        http.server.requests: 0.5,0.95,0.99
    export:
      prometheus:
        enabled: true

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.dogancaglar.paymentservice.infra.adapter.outbound.persistence.entity
  type-handlers-package: com.dogancaglar.common.db.typehandler

