app:
  cache:
    ttl-seconds: 3600  # 1 hour redis TTL for PSP result cache


server:
  port: 8080
  tomcat:
    accesslog:
      enabled: true
      directory: /var/log/tomcat
      prefix: access_log
      suffix: .log
      pattern: '%h %l %u %t "%r" %s %b %D'
      buffered: true

spring:
  application:
    name: payment-consumers
  lifecycle:
    timeout-per-shutdown-phase: 45s
  jackson:
    time-zone: UTC
  datasource:
    payment-consumers:
      driver-class-name: org.postgresql.Driver
      type: com.zaxxer.hikari.HikariDataSource
      hikari:
        pool-name: ${spring.application.name}-PaymentConsumerHikariPool
    account-snapshot-job:
      driver-class-name: org.postgresql.Driver
      type: com.zaxxer.hikari.HikariDataSource
      hikari:
        pool-name: ${spring.application.name}-AccountSnapshotHikariPool


  liquibase:
    enabled: false
    change-log: classpath:db/changelog/changelog.central.xml

management:
  server:
    port: 9000
  health:
    probes:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "prometheus,metrics,health"
  endpoint:
    health:
      enabled: true
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: payment-consumers
    enable:
      all: true
      hikaricp.connections: true
      hikaricp.connections.acquire: true
      process.cpu.usage: true
      jvm.threads.live: true
      jvm.memory.used: true
      jvm.memory.max: true
      jvm.gc.pause: true
      kafka.consumer.fetch.manager.records.lag: true
      kafka.consumer.fetch.manager.records.consumed: true
      kafka.consumer.fetch.manager.fetch.latency: true
      kafka.consumer.io.time: true
      kafka.consumer.records.lag.max: true
      redis_dirty_accounts_size: true
      kafka.consumer.fetch.latency.avg: true
      kafka.consumer.fetch.latency.max: true
      kafka.producer.batch.size.avg: true
      kafka.producer.batch.size.max: true
      kafka.producer.request.latency.avg: true
      kafka.producer.topic.record.send: true
      kafka.producer.request.latency.max: true
      kafka.producer.compression.rate.avg: true
      kafka.producer.record.send.total: true
      kafka.producer.record.error.total: true
      kafka.producer.record.retry.total: true
      kafka.producer.outgoing.byte.total: true
      kafka.producer.io.wait.time.total: true
      kafka.producer.bufferpool.wait.ratio: true
      kafka.producer.bufferpool.wait.time.total: true
      psp_calls_total: true
      psp_call_latency: true
      psp_queue_delay: true
      psp_exec_duration: true
      psp_refund_calls_total: true
      redis_retry_zset_size: true
      redis_retry_batch_size: true
      redis_retry_events_total: true
      redis_retry_dispatch_batch_seconds: true
      redis_retry_dispatch_event_seconds: true
      http.server.requests: true
      tomcat.threads: true
    distribution:
      percentiles-histogram:
        psp_call_latency: true
        redis_retry_dispatch_batch_seconds: true
        redis_retry_dispatch_event_seconds: true
        http.server.requests: true
      percentiles:
        psp_call_latency: 0.5,0.95,0.99
        redis_retry_dispatch_batch_seconds: 0.5,0.95,0.99
        redis_retry_dispatch_event_seconds: 0.5,0.95,0.99
        http.server.requests: 0.5,0.95,0.99
    export:
      prometheus:
        enabled: true

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.dogancaglar.common.db.entity
  type-handlers-package: com.dogancaglar.common.db.typehandler

psp:
  gateway:
    type: SIMULATED
  refund:
    simulation:
      scenarios:
        NORMAL:
          timeouts:
            enabled: true
            probability: 0
          latency:
            fast:
              probability: 100
              minMs: 50
              maxMs: 150
            moderate:
              probability: 0
              minMs: 150
              maxMs: 300
            slow:
              probability: 0
              minMs: 300
              maxMs: 600
          response:
            successful: 50
            retryable: 40
            nonRetryable: 10
        PEAK:
          timeouts:
            enabled: true
            probability: 25
          latency:
            fast:
              probability: 30
              minMs: 250
              maxMs: 500
            moderate:
              probability: 50
              minMs: 501
              maxMs: 1500
            slow:
              probability: 20
              minMs: 1501
              maxMs: 2500
          response:
            successful: 50
            retryable: 45
            statusCheck: 0
            nonRetryable: 5
        DEGRADED:
