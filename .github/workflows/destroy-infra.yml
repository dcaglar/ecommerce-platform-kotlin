name: "Phase 3: Destroy Infrastructure"

on:
  workflow_dispatch:
    branches:
      - main

permissions:
  contents: read

jobs:
  terraform-plan-destroy:
    name: "Terraform Destroy Plan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform Destroy Plan
        working-directory: infra/terraform
        id: plan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: terraform plan -destroy -out=tfplan

      - name: Save Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-destroy
          path: infra/terraform/tfplan

      - name: Display Plan Summary
        run: echo "⚠️ DESTROY plan complete! Review carefully - this will DELETE all infrastructure and STOP BILLING."

  manual-approval:
    name: "⏸️ Manual Approval Gate (DESTRUCTIVE)"
    runs-on: ubuntu-latest
    needs: terraform-plan-destroy
    environment:
      name: azure-loadtest
    steps:
      - name: Waiting for Your Approval
        run: |
          echo "⚠️  WARNING: This will DESTROY the entire infrastructure!"
          echo "🔍 Review the destroy plan above"
          echo "✅ Click 'Review deployments' to approve or reject"
          echo "⏳ Waiting for manual approval..."

  destroy-infrastructure:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    needs: manual-approval
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-destroy
          path: infra/terraform

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform Destroy
        working-directory: infra/terraform
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        # This will wipe out the cluster instantly and stop all billing!
        run: terraform destroy -auto-approve

      - name: ✅ Destruction Complete
        run: echo "Infrastructure destroyed! All billing stopped."