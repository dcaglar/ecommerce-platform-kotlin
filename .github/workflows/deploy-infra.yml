name: "Phase 1 & 2: Deploy Infrastructure and Application"

on:
  workflow_dispatch:
    branches:
      - main

permissions:
  contents: read

jobs:
  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra/terraform
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: terraform init

      - name: Terraform Plan
        working-directory: infra/terraform
        id: plan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: terraform plan -out=tfplan

      - name: Save Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: infra/terraform/tfplan

      - name: Display Plan Summary
        run: echo "✅ Terraform plan complete! Review the plan in the next step before approving."

  manual-approval:
    name: "⏸️ Manual Approval Gate"
    runs-on: ubuntu-latest
    needs: terraform-plan
    environment:
      name: azure-loadtest
    steps:
      - name: Waiting for Your Approval
        run: |
          echo "🔍 Review the terraform plan above"
          echo "✅ Click 'Review deployments' to approve or reject"
          echo "⏳ Waiting for manual approval..."

  deploy-infrastructure:
    name: "Terraform Apply & Helm Deploy"
    runs-on: ubuntu-latest
    needs: manual-approval
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: infra/terraform

      # ---------- PHASE 1: INFRASTRUCTURE (TERRAFORM) ----------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra/terraform
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: terraform init

      - name: Terraform Apply
        working-directory: infra/terraform
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: terraform apply -auto-approve tfplan

      # ---------- PHASE 2: BUILD & PUSH ----------

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Images
        env:
          DOCKER_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          ./infra/scripts/build-and-push-payment-service-docker-repo.sh ${{ secrets.DOCKERHUB_USERNAME }} latest
          ./infra/scripts/build-and-push-payment-edge-workers-docker-repo.sh ${{ secrets.DOCKERHUB_USERNAME }} latest
          ./infra/scripts/build-and-push-payment-consumers-docker-repo.sh ${{ secrets.DOCKERHUB_USERNAME }} latest
          ./infra/scripts/build-and-push-payment-central-relay-docker-repo.sh ${{ secrets.DOCKERHUB_USERNAME }} latest

      # ---------- PHASE 3: HELM DEPLOYMENT ----------
      - name: Get AKS Credentials
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          az login --service-principal -u $ARM_CLIENT_ID -p $ARM_CLIENT_SECRET --tenant $ARM_TENANT_ID
          az aks get-credentials --resource-group rg-payment-platform-loadtest --name aks-payment-loadtest --overwrite-existing

      - name: Setup Helm & Plugins
        run: |
          curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
          chmod 700 get_helm.sh
          ./get_helm.sh
          helm plugin install https://github.com/jkroepke/helm-secrets

      - name: Deploy Azure Environment
        run: |
          # We execute your exact bash scripts, just pointing to the Azure versions!
          ./infra/scripts/deploy-all-azure.sh

      - name: ✅ Deployment Complete
        run: echo "Infrastructure and applications deployed successfully!"