# Source: central-db/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: central-db-headless # Standard name for headless
  labels:
    app: central-db
spec:
  clusterIP: None # This is what makes it headless
  selector:
    app: central-db
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
      protocol: TCP
---
# Source: central-db/templates/statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: central-db
  labels:
    app: central-db
spec:
  serviceName: central-db-headless
  replicas: 1
  selector:
    matchLabels:
      app: central-db
  template:
    metadata:
      labels:
        app: central-db
      annotations:
        rollout/reboot: "1782002393"
    spec:
      terminationGracePeriodSeconds: 60
      initContainers:
        - name: liquibase-migration
          image: liquibase/liquibase:4.24.0
          envFrom:
          - secretRef:
              name: central-db-credentials
              optional: true
          - configMapRef:
              name: central-db-config
              optional: true

          env:
            - name: LIQUIBASE_COMMAND_URL
              value: "jdbc:postgresql://localhost:5432/central-db?options=-c%20timezone=UTC"
            - name: LIQUIBASE_COMMAND_USERNAME
              valueFrom: {secretKeyRef: {name: central-db-credentials, key: CENTRAL_DB_PAYMENT_CONSUMERS_USERNAME}}
            - name: LIQUIBASE_COMMAND_PASSWORD
              valueFrom: {secretKeyRef: {name: central-db-credentials, key: CENTRAL_DB_PAYMENT_CONSUMERS_PASSWORD}}
          args: ["--search-path=/shared-workspace", "update", "--changelog-file=changelog.central.xml"]
          volumeMounts:
            - name: liquibase-workspace
              mountPath: /shared-workspace
      containers:
        - name: central-db
          image: "postgres:15"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          args:
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
                - -d
                - central-db
                - -tAc
                - "SELECT 1 FROM databasechangelog WHERE id = '2026-06-09-create-transfers-table' AND author = 'dogancaglar' AND exectype = 'EXECUTED';"
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: db-init-scripts
              mountPath: /docker-entrypoint-initdb.d
            - name: data
              mountPath: /var/lib/postgresql/data
          envFrom:
            - secretRef:
                name: central-db-credentials
                optional: true
            - configMapRef:
                name: central-db-config
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: central-db-config
                  key: CENTRAL_DB_NAME
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: central-db-credentials
                  key: CENTRAL_DB_POSTGRES_PASSWORD
            # Pass the credentials the script needs to create
            - name: CENTRAL_DB_PAYMENT_CONSUMERS_USERNAME
              valueFrom: {secretKeyRef: {name: central-db-credentials, key: CENTRAL_DB_PAYMENT_CONSUMERS_USERNAME}}
            - name: CENTRAL_DB_PAYMENT_CONSUMERS_PASSWORD
              valueFrom: {secretKeyRef: {name: central-db-credentials, key: CENTRAL_DB_PAYMENT_CONSUMERS_PASSWORD}}
            - name: CENTRAL_DB_PAYMENT_CENTRAL_RELAY_USERNAME
              valueFrom: {secretKeyRef: {name: central-db-credentials, key: CENTRAL_DB_PAYMENT_CENTRAL_RELAY_USERNAME}}
            - name: CENTRAL_DB_PAYMENT_CENTRAL_RELAY_PASSWORD
              valueFrom: {secretKeyRef: {name: central-db-credentials, key: CENTRAL_DB_PAYMENT_CENTRAL_RELAY_PASSWORD}}
            - name: CENTRAL_DB_PAYMENT_EDGE_WORKERS_USERNAME
              valueFrom: {secretKeyRef: {name: central-db-credentials, key: CENTRAL_DB_PAYMENT_EDGE_WORKERS_USERNAME}}
            - name: CENTRAL_DB_PAYMENT_EDGE_WORKERS_PASSWORD
              valueFrom: {secretKeyRef: {name: central-db-credentials, key: CENTRAL_DB_PAYMENT_EDGE_WORKERS_PASSWORD}}
            - name: CENTRAL_DB_DUTY_USERNAME
              valueFrom: {secretKeyRef: {name: central-db-credentials, key: CENTRAL_DB_DUTY_USERNAME}}
            - name: CENTRAL_DB_DUTY_PASSWORD
              valueFrom: {secretKeyRef: {name: central-db-credentials, key: CENTRAL_DB_DUTY_PASSWORD}}
          resources:
            {}

      volumes:
        - name: db-init-scripts
          configMap:
            name: central-db-init-configmap
        - name: liquibase-workspace
          configMap:
           name: central-db-changelog-configmap
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 5Gi
