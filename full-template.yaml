  central-payment-outbox-changelog.xml: |-
    <?xml version="1.0" encoding="UTF-8"?>
    <databaseChangeLog
            xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
            xmlns="http://www.liquibase.org/xml/ns/dbchangelog"
            xsi:schemaLocation="http://www.liquibase.org/xml/ns/dbchangelog
                            http://www.liquibase.org/xml/ns/dbchangelog/dbchangelog-4.3.xsd">
            <!-- =============================================================
                 01. Create main partitioned outbox_event table
                 ============================================================= -->
            <changeSet id="20251112-01-create-outbox-event-parent" author="dogancaglar">
                <sql>
                    CREATE TABLE outbox_event (
                    oeid           BIGINT NOT NULL,
                    event_type     VARCHAR(255) NOT NULL,
                    aggregate_id   VARCHAR(255) NOT NULL,
                    payload        TEXT NOT NULL,
                    status         VARCHAR(50) NOT NULL,
                    created_at     TIMESTAMP WITHOUT TIME ZONE NOT NULL DEFAULT (NOW() AT TIME ZONE 'UTC'),
                    updated_at     TIMESTAMP WITHOUT TIME ZONE NOT NULL DEFAULT (NOW() AT TIME ZONE 'UTC'),
                    claimed_at     TIMESTAMP WITHOUT TIME ZONE,
                    claimed_by     VARCHAR(128),
                    PRIMARY KEY (oeid, created_at)
                    )
                    PARTITION BY RANGE (created_at);
                </sql>
            </changeSet>
    
            <!-- =============================================================
                 02. Helpful indexes for filtering, ordering, claiming
                 ============================================================= -->
            <changeSet id="20251112-02-create-index-outbox-event-createdat" author="dogancaglar">
                <createIndex indexName="idx_outbox_event_createdat" tableName="outbox_event">
                    <column name="created_at"/>
                </createIndex>
            </changeSet>
    
            <changeSet id="20251112-03-create-index-outbox-event-status" author="dogancaglar">
                <createIndex indexName="idx_outbox_event_status" tableName="outbox_event">
                    <column name="status"/>
                </createIndex>
            </changeSet>
    
            <changeSet id="20251112-04-create-index-outbox-status-createdat" author="dogancaglar">
                <createIndex indexName="idx_outbox_status_createdat" tableName="outbox_event">
                    <column name="status"/>
                    <column name="created_at"/>
                </createIndex>
            </changeSet>
    
            <changeSet id="20251112-05-create-index-outbox-status-claimedat" author="dogancaglar">
                <createIndex indexName="idx_outbox_status_claimed_at" tableName="outbox_event">
                    <column name="status"/>
                    <column name="claimed_at"/>
                </createIndex>
            </changeSet>
    
    
    
    
        </databaseChangeLog>
    
  central-payments-table.xml: |-
    <?xml version="1.0" encoding="UTF-8"?>
    <databaseChangeLog
            xmlns="http://www.liquibase.org/xml/ns/dbchangelog"
            xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
            xsi:schemaLocation="http://www.liquibase.org/xml/ns/dbchangelog
                            http://www.liquibase.org/xml/ns/dbchangelog/dbchangelog-4.3.xsd">
    
        <!--
            Epic 1 — US 1.3: Central DB Payments Table
            ============================================================
            The Payment aggregate is owned by the Central Core Cluster.
            It is populated by PspResultConsumer upon receiving a
            PaymentAuthorized event via Kafka.
    
            Key design decisions reflected in this schema:
              - NO order_id: Payment is decoupled from e-commerce order.
              - merchant_account: primary MoR entity, mandatory.
              - processing_model: DIRECT_MERCHANT | MARKETPLACE, locked at auth time.
              - splits_json (jsonb): immutable routing matrix written once at birth.
              - status domain: AUTHORIZED → SENT_FOR_SETTLE → CAPTURED etc.
                (AUTHORIZED replaces old NOT_CAPTURED; SENT_FOR_SETTLE is new).
        -->
    
        <changeSet id="2026-05-31-01-create-central-payments" author="dogancaglar">
    
            <!-- ============================================================
                 1. Create the payments table in central DB
                 ============================================================ -->
            <createTable tableName="payments">
    
                <column name="payment_id" type="BIGINT">
                    <constraints primaryKey="true" nullable="false"
                                 primaryKeyName="pk_payments"/>
                </column>
    
                <column name="payment_intent_id" type="BIGINT">
                    <constraints nullable="false"/>
                </column>
    
                <column name="buyer_id" type="VARCHAR(255)">
                    <constraints nullable="false"/>
                </column>
    
                <!-- Primary merchant-of-record entity identifier.
                     Replaces the old order_id column from the Edge schema. -->
                <column name="merchant_account" type="VARCHAR(255)">
                    <constraints nullable="false"/>
                </column>
    
                <!-- Routing model locked at authorization time.
                     Values: DIRECT_MERCHANT | MARKETPLACE -->
                <column name="processing_model" type="VARCHAR(32)">
                    <constraints nullable="false"/>
                </column>
    
                <column name="total_amount_value" type="BIGINT">
                    <constraints nullable="false"/>
                </column>
    
                <column name="captured_amount_value" type="BIGINT" defaultValueNumeric="0">
                    <constraints nullable="false"/>
                </column>
    
                <column name="refunded_amount_value" type="BIGINT" defaultValueNumeric="0">
                    <constraints nullable="false"/>
                </column>
    
                <column name="currency" type="CHAR(3)">
                    <constraints nullable="false"/>
                </column>
    
                <!-- PaymentStatus enum stored as string.
                     Valid values: AUTHORIZED, SENT_FOR_SETTLE, CAPTURED,
                                   PARTIALLY_CAPTURED, VOIDED, PARTIALLY_REFUNDED, REFUNDED -->
                <column name="status" type="VARCHAR(50)">
                    <constraints nullable="false"/>
                </column>
    
                <!-- Immutable JSON array of PaymentSplit routing instructions.
                     Written once at PspResultConsumer time from the PaymentAuthorized event.
                     Each element: { targetAccountType, targetEntityId, amountValue, currency } -->
                <column name="splits_json" type="jsonb">
                    <constraints nullable="false"/>
                </column>
    
                <column name="created_at" type="TIMESTAMP WITHOUT TIME ZONE"
                        defaultValueComputed="(now() AT TIME ZONE 'UTC')">
                    <constraints nullable="false"/>
                </column>
    
                <column name="updated_at" type="TIMESTAMP WITHOUT TIME ZONE"
                        defaultValueComputed="(now() AT TIME ZONE 'UTC')">
                    <constraints nullable="false"/>
                </column>
    
            </createTable>
    
            <!-- ============================================================
                 2. CHECK constraints (raw SQL — most portable across PG versions)
                 ============================================================ -->
            <sql>
                ALTER TABLE payments
                    ADD CONSTRAINT chk_payments_status_valid
                        CHECK (status IN (
                            'AUTHORIZED',
                            'SENT_FOR_SETTLE',
                            'CAPTURED',
                            'PARTIALLY_CAPTURED',
                            'VOIDED',
                            'PARTIALLY_REFUNDED',
                            'REFUNDED'
                        ));
            </sql>
    
            <sql>
                ALTER TABLE payments
                    ADD CONSTRAINT chk_payments_processing_model
                        CHECK (processing_model IN ('DIRECT_MERCHANT', 'MARKETPLACE'));
            </sql>
    
            <sql>
                ALTER TABLE payments
                    ADD CONSTRAINT chk_payments_currency_3
                        CHECK (currency ~ '^[A-Z]{3}$');
            </sql>
    
            <sql>
                ALTER TABLE payments
                    ADD CONSTRAINT chk_payments_total_positive
                        CHECK (total_amount_value > 0);
            </sql>
    
            <sql>
                ALTER TABLE payments
                    ADD CONSTRAINT chk_payments_captured_le_total
                        CHECK (
                            captured_amount_value >= 0 AND
                            captured_amount_value &lt;= total_amount_value
                        );
            </sql>
    
            <sql>
                ALTER TABLE payments
                    ADD CONSTRAINT chk_payments_refunded_le_captured
                        CHECK (
                            refunded_amount_value >= 0 AND
                            refunded_amount_value &lt;= captured_amount_value
                        );
            </sql>
    
            <!-- ============================================================
                 3. Indexes
                 ============================================================ -->
            <createIndex tableName="payments" indexName="idx_payments_payment_intent_id">
                <column name="payment_intent_id"/>
            </createIndex>
    
            <createIndex tableName="payments" indexName="idx_payments_merchant_account">
                <column name="merchant_account"/>
            </createIndex>
    
            <createIndex tableName="payments" indexName="idx_payments_status">
                <column name="status"/>
            </createIndex>
    
    
    
            <!-- ============================================================
                 4. Rollback
                 ============================================================ -->
            <rollback>
                <dropTable tableName="payments"/>
            </rollback>
    
        </changeSet>
    
    </databaseChangeLog>
    
  central-transfers-table.xml: |-
    <?xml version="1.0" encoding="UTF-8"?>
    <databaseChangeLog
            xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
            xmlns="http://www.liquibase.org/xml/ns/dbchangelog"
            xsi:schemaLocation="http://www.liquibase.org/xml/ns/dbchangelog
                            http://www.liquibase.org/xml/ns/dbchangelog/dbchangelog-4.3.xsd">
    
        <changeSet id="2026-06-09-create-transfers-table" author="dogancaglar">
            <createTable tableName="transfers">
                <column name="transfer_id" type="BIGINT">
                    <constraints primaryKey="true" nullable="false"/>
                </column>
                <column name="source_transaction_id" type="BIGINT">
                    <constraints nullable="false"/>
                </column>
                <column name="amount_value" type="BIGINT">
                    <constraints nullable="false"/>
                </column>
                <column name="currency" type="CHAR(3)">
                    <constraints nullable="false"/>
                </column>
                <column name="target_account" type="VARCHAR(255)">
                    <constraints nullable="false"/>
                </column>
                <column name="source_account" type="VARCHAR(255)">
                    <constraints nullable="false"/>
                </column>
                <column name="transfer_type" type="VARCHAR(50)">
                    <constraints nullable="false"/>
                </column>
                <column name="status" type="VARCHAR(50)">
                    <constraints nullable="false"/>
                </column>
                <column name="created_at" type="TIMESTAMP WITHOUT TIME ZONE"
                        defaultValueComputed="(now() AT TIME ZONE 'UTC')">
                    <constraints nullable="false"/>
                </column>
                <column name="updated_at" type="TIMESTAMP WITHOUT TIME ZONE"
                        defaultValueComputed="(now() AT TIME ZONE 'UTC')">
                    <constraints nullable="false"/>
                </column>
            </createTable>
            
            <sql>
                ALTER TABLE transfers ADD CONSTRAINT chk_transfers_amount_positive CHECK (amount_value >= 0);
                ALTER TABLE transfers ADD CONSTRAINT chk_transfers_currency_3 CHECK (currency ~ '^[A-Z]{3}$');
            </sql>
    
            <createIndex tableName="transfers" indexName="idx_transfers_target_account">
                <column name="target_account"/>
            </createIndex>
            
            <createIndex tableName="transfers" indexName="idx_transfers_source_account">
                <column name="source_account"/>
            </createIndex>
        </changeSet>
    
    </databaseChangeLog>
    
  changelog.central.xml: |-
    <?xml version="1.0" encoding="UTF-8"?>
    <databaseChangeLog
            xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
            xmlns="http://www.liquibase.org/xml/ns/dbchangelog"
            xsi:schemaLocation="http://www.liquibase.org/xml/ns/dbchangelog
                            http://www.liquibase.org/xml/ns/dbchangelog/dbchangelog-4.3.xsd">
        <include file="central-payment-outbox-changelog.xml" relativeToChangelogFile="true"/>
        <include file="central-edge-watermak-table.xml" relativeToChangelogFile="true"/>
        <include file="central-payments-table.xml" relativeToChangelogFile="true"/>
        <include file="central-accounting-tables.xml" relativeToChangelogFile="true"/>
        <include file="central-account-profile.xml" relativeToChangelogFile="true"/>
        <include file="central-account-balances-table.xml" relativeToChangelogFile="true"/>
        <include file="central-transfers-table.xml" relativeToChangelogFile="true"/>
        <!-- Epic 1: Payment aggregate moves to Central DB; payment_tx refactored -->
    
    </databaseChangeLog>
