app:
  instance-id: ${POD_NAME:${HOSTNAME:${random.value}}}
  datasource:
    # ─── 1. CORE TRANSACTIONAL DATABASE POOL ───
    central-outbox:
      jdbc-url: ${CENTRAL_DB_URL}
      username: ${CENTRAL_DB_PAYMENT_CENTRAL_RELAY_USERNAME}
      password: ${CENTRAL_DB_PAYMENT_CENTRAL_RELAY_PASSWORD}
      maximum-pool-size: 5
      minimum-idle: 2

    # ─── 2. MAINTENANCE POOL ───
    maintenance:
      jdbc-url: ${CENTRAL_DB_URL}
      username: ${CENTRAL_DB_DUTY_USERNAME}
      password: ${CENTRAL_DB_DUTY_PASSWORD}
      maximum-pool-size: 2
      minimum-idle: 0

outbox-relay:
  batch-size: 500
  poll-interval: 1000
